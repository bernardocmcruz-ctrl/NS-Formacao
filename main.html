    /* ── TEMA ESCURO (padrão) ── */
    :root {
      --bg:   #0f172a; --surf: #1e293b; --surf2: #263347;
      --brd:  rgba(71,85,105,.28); --txt: #e2e8f0; --muted: #94a3b8;
      --acc:  #f59e0b; --atxt: #0f172a; --ok: #22c55e; --err: #f43f5e; --warn: #fb923c;
      --side: #0c1829;
    }
    /* ── TEMA CLARO ── */
    html.light {
      --bg:   #eef3f9; --surf: #ffffff; --surf2: #dce8f5;
      --brd:  rgba(100,116,139,.18); --txt: #1e293b; --muted: #64748b;
      --acc:  #d97706; --atxt: #ffffff; --ok: #16a34a; --err: #dc2626; --warn: #ea580c;
      --side: #1e293b;
    }
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .25s,color .25s}
    #root{height:100%}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:var(--acc)}
    @keyframes pageFwd{from{opacity:0;transform:translateX(36px) scale(.98)}to{opacity:1;transform:none}}
    @keyframes pageBwd{from{opacity:0;transform:translateX(-36px) scale(.98)}to{opacity:1;transform:none}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .page-fwd{animation:pageFwd .26s cubic-bezier(.25,.46,.45,.94)}
    .page-bwd{animation:pageBwd .26s cubic-bezier(.25,.46,.45,.94)}
    .fade-up{animation:fadeUp .22s ease-out}
    input[type=number]{-moz-appearance:textfield;appearance:textfield}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input,textarea,select{
      background:var(--surf2);color:var(--txt);border:1px solid var(--brd);
      border-radius:10px;padding:9px 13px;font-size:13px;width:100%;outline:none;transition:border-color .2s}
    input:focus,textarea:focus,select:focus{border-color:var(--acc)}
    textarea{resize:none}
  </style>
</head>

const getLevel = pts => [...CAREER].reverse().find(l=>pts>=l.minPts)??CAREER[0];
const getNext  = pts => CAREER.find(l=>l.minPts>pts)??null;

const saveProfile  = p=>{try{localStorage.setItem('nspro_v1',JSON.stringify(p));}catch{}};

const Card=({children,className='',style={}})=>(
  <div className={`rounded-2xl ${className}`} style={{...S.surf,...style}}>{children}</div>
);

  <div className="flex p-1 rounded-2xl mb-5" style={S.surf2}>

// ── CAREER BAR ────────────────────────────────────────────────────────────────

function CareerBar({profile}){
  const cur=getLevel(profile.pts),next=getNext(profile.pts);
  const pct=next?((profile.pts-cur.minPts)/(next.minPts-cur.minPts))*100:100;
  return(
    <Card className="p-5 mb-5 relative overflow-hidden">
      <div className="absolute -right-12 -top-12 w-40 h-40 rounded-full pointer-events-none"
           style={{background:'radial-gradient(circle,rgba(245,158,11,.1),transparent 70%)'}}/>
      <div className="flex justify-between items-start mb-4">
        <div>
          <p className="text-xs uppercase tracking-widest mb-1" style={{color:'var(--muted)'}}>Nível Atual</p>
          <p className={`text-lg font-black ${cur.cls}`}>{cur.icon} {cur.label}</p>
        </div>
        <div className="text-right">
          <p className="text-3xl font-black leading-none" style={{color:'var(--acc)'}}>{profile.pts}</p>
          <p className="text-xs" style={{color:'var(--muted)'}}>pontos</p>
        </div>
      </div>
      <div className="w-full rounded-full h-2.5 overflow-hidden mb-2" style={{background:'var(--surf2)'}}>
        <div className="h-full rounded-full transition-all duration-700"
             style={{width:`${pct}%`,background:'linear-gradient(90deg,var(--acc),#fde68a)'}}/>
      </div>
      {next
        ?<div className="flex justify-between text-xs" style={{color:'var(--muted)'}}>
           <span>{cur.label}</span>
           <span style={{color:'var(--acc)'}} className="font-semibold">{next.minPts-profile.pts} pts → {next.icon} {next.label}</span>
         </div>
        :<p className="text-xs text-center font-bold text-yellow-300">🏆 Nível máximo atingido!</p>}
    </Card>
  );
}

// ── RESUMOS / SLIDES ──────────────────────────────────────────────────────────

function SlideViewer({modId}){
  const slides=SLIDES[modId]||[];
  const [idx,setIdx]=useState(0);
  useEffect(()=>setIdx(0),[modId]);
  if(!slides.length)return(
    <Card className="p-8 text-center">
      <p className="text-4xl mb-3">📝</p>
      <p style={{color:'var(--muted)'}}>Conteúdo em elaboração</p>
    </Card>
  );
  const s=slides[idx];
  return(
    <div>
      <div className="flex justify-between items-center mb-3">
        <span className="text-xs uppercase tracking-widest" style={{color:'var(--muted)'}}>{MODULES.find(m=>m.id===modId)?.title}</span>
        <span className="text-xs font-semibold px-3 py-1 rounded-full" style={S.surf2}>{idx+1}/{slides.length}</span>
      </div>
      <div className="flex gap-1.5 mb-4">
        {slides.map((_,i)=>(
          <button key={i} onClick={()=>setIdx(i)} className="flex-1 h-1.5 rounded-full transition-all" style={{background:i===idx?s.color:'var(--surf2)'}}/>
        ))}
      </div>

// ── JOGO DAS BANDEIRAS ────────────────────────────────────────────────────────

function BandeirasGame(){
  const [idx,setIdx]=useState(0),[sel,setSel]=useState(null),[score,setScore]=useState(0),[done,setDone]=useState(false);
  const q=BANDEIRAS[idx];
  function pick(opt){if(sel!==null)return;setSel(opt);if(opt===q.ans)setScore(s=>s+1);}
  function next(){if(idx+1>=BANDEIRAS.length)setDone(true);else{setSel(null);setIdx(i=>i+1);}}
  function restart(){setSel(null);setIdx(0);setScore(0);setDone(false);}
  if(done)return(
    <Card className="p-6 text-center fade-up">
      <div className="text-5xl mb-3">🚩</div>
      <h3 className="text-xl font-black mb-1" style={{color:'var(--acc)'}}>Resultado Final</h3>
      <p className="mb-5" style={{color:'var(--muted)'}}>{score}/{BANDEIRAS.length} corretas</p>
      <div className="rounded-xl p-4 mb-5" style={score>=4?S.ok:S.err}>
        <p className="text-3xl font-black">{score>=5?'🏆':score>=3?'👍':'📚'}</p>
        <p className="text-sm font-semibold mt-1">{score>=5?'Excelente!':score>=3?'Bom — continua a estudar!':'Revê as bandeiras!'}</p>
      </div>
      <button onClick={restart} className="w-full py-3 rounded-xl font-bold" style={S.acc}>Jogar de Novo</button>
    </Card>
  );
  return(
    <Card className="p-5 fade-up">
      <div className="flex justify-between items-center mb-5">
        <span className="text-xs uppercase tracking-widest" style={{color:'var(--muted)'}}>Jogo das Bandeiras</span>
        <span className="text-xs font-semibold px-3 py-1 rounded-full" style={S.surf2}>{idx+1}/{BANDEIRAS.length}</span>
      </div>
      <div className="text-center mb-6">
        <div className="text-7xl mb-3">{q.emoji}</div>
        <p className="text-lg font-black">Bandeira {q.name}</p>
        <p className="text-sm" style={{color:'var(--muted)'}}>O que significa?</p>
      </div>
      <div className="space-y-2 mb-4">
        {q.opts.map((opt,i)=>{
          let st={...S.surf2};
          if(sel){if(opt===q.ans)st=S.ok;else if(opt===sel)st=S.err;else st={...S.surf2,opacity:.4};}
          return(<button key={i} onClick={()=>pick(opt)} className="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all" style={st}>{opt}</button>);
        })}
      </div>
      {sel&&<button onClick={next} className="w-full py-3 rounded-xl font-bold" style={S.acc}>{idx+1>=BANDEIRAS.length?'Ver Resultado →':'Próxima →'}</button>}
    </Card>
  );
}

// ── FLASHCARD GAME ────────────────────────────────────────────────────────────

function FlashcardGame(){
  const [idx,setIdx]=useState(0),[flipped,setFlipped]=useState(false);
  const [known,setKnown]=useState([]),[unknown,setUnknown]=useState([]);
  const q=QUESTIONS[idx];
  function rate(k){
    if(k)setKnown(a=>[...a,q.id]);else setUnknown(a=>[...a,q.id]);
    setFlipped(false);
    if(idx<QUESTIONS.length-1)setIdx(i=>i+1);
  }
  function restart(){setIdx(0);setFlipped(false);setKnown([]);setUnknown([]);}
  if(known.length+unknown.length===QUESTIONS.length)return(
    <Card className="p-6 text-center fade-up">
      <div className="text-5xl mb-3">🎓</div>
      <h3 className="text-xl font-black mb-1" style={{color:'var(--acc)'}}>Sessão Completa!</h3>
      <p className="mb-5" style={{color:'var(--muted)'}}>Sabes {known.length} de {QUESTIONS.length}</p>
      <div className="grid grid-cols-2 gap-3 mb-5">
        <div className="rounded-xl p-3 text-center" style={S.ok}><p className="text-2xl font-black">{known.length}</p><p className="text-xs">Sei bem</p></div>
        <div className="rounded-xl p-3 text-center" style={S.err}><p className="text-2xl font-black">{unknown.length}</p><p className="text-xs">A rever</p></div>
      </div>
      <button onClick={restart} className="w-full py-3 rounded-xl font-bold" style={S.acc}>Nova Sessão</button>
    </Card>
  );
  return(
    <div className="fade-up">
      <div className="flex justify-between items-center mb-3">
        <span className="text-xs uppercase tracking-widest" style={{color:'var(--muted)'}}>Flashcards</span>
        <div className="flex gap-2">
          <span className="text-xs px-2 py-1 rounded-full" style={S.ok}>{known.length} ✓</span>
          <span className="text-xs px-2 py-1 rounded-full" style={S.err}>{unknown.length} ✗</span>
        </div>
      </div>
      <div className="w-full rounded-full h-1.5 mb-4 overflow-hidden" style={{background:'var(--surf2)'}}>
        <div className="h-full rounded-full transition-all" style={{width:`${((known.length+unknown.length)/QUESTIONS.length)*100}%`,background:'var(--acc)'}}/>
      </div>
      <Card className="p-5 mb-4 cursor-pointer select-none min-h-40 flex flex-col justify-center" onClick={()=>!flipped&&setFlipped(true)}>
        {!flipped?(
          <div className="text-center">
            <p className="text-xs uppercase tracking-widest mb-4" style={{color:'var(--muted)'}}>Questão {idx+1}/{QUESTIONS.length}</p>
            <p className="font-semibold text-sm leading-relaxed">{q.q}</p>
            <p className="text-xs mt-5" style={{color:'var(--acc)'}}>Toca para revelar →</p>
          </div>
        ):(
          <div className="fade-up">
            <p className="text-xs uppercase tracking-widest mb-3" style={{color:'var(--muted)'}}>Resposta correta:</p>
            <p className="font-bold text-sm mb-3" style={{color:'var(--ok)'}}>{q.opts[q.c]}</p>
            <p className="text-xs leading-relaxed" style={{color:'var(--muted)'}}>{q.exp}</p>
          </div>
        )}
      </Card>
      {flipped&&(
        <div className="grid grid-cols-2 gap-3 fade-up">
          <button onClick={()=>rate(false)} className="py-3 rounded-xl font-bold text-sm" style={S.err}>😕 A Rever</button>
          <button onClick={()=>rate(true)}  className="py-3 rounded-xl font-bold text-sm" style={S.ok}>😊 Sei!</button>
        </div>
      )}
    </div>
  );
}

function Quiz({profile,onUpdate}){
  const [idx,setIdx]=useState(0),[sel,setSel]=useState(null);
  const [pts,setPts]=useState(0),[hit,setHit]=useState(0);
  const [streak,setStreak]=useState(0),[done,setDone]=useState(false);
  const pending=QUESTIONS.filter(q=>!profile.completedQuestions.includes(q.id));
  const batch=(pending.length>=5?pending:QUESTIONS).slice(0,5);
  const q=batch[idx];
  function pick(i){
    if(sel!==null)return;setSel(i);
    if(i===q.c){const ns=streak+1;setStreak(ns);setPts(p=>p+(ns>=3?15:10));setHit(h=>h+1);}
    else setStreak(0);
  }
  function next(){
    if(idx+1>=batch.length){
      onUpdate({...profile,pts:profile.pts+pts,completedQuestions:[...new Set([...profile.completedQuestions,...batch.map(x=>x.id)])]});
      setDone(true);
    }else{setSel(null);setIdx(i=>i+1);}
  }
  function restart(){setIdx(0);setSel(null);setPts(0);setHit(0);setStreak(0);setDone(false);}
  if(done)return(
    <Card className="p-6 text-center fade-up">
      <div className="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl"
           style={{background:'rgba(245,158,11,.15)',border:'2px solid rgba(245,158,11,.3)'}}>🎉</div>
      <h3 className="text-xl font-black mb-1" style={{color:'var(--acc)'}}>Quiz Concluído!</h3>
      <p className="text-sm mb-5" style={{color:'var(--muted)'}}>{hit}/{batch.length} corretas</p>
      <div className="rounded-xl p-4 mb-5" style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)'}}>
        <p className="text-4xl font-black" style={{color:'var(--acc)'}}>+{pts}</p>
        <p className="text-xs mt-1" style={{color:'var(--muted)'}}>pontos ganhos</p>
      </div>
      <button onClick={restart} className="w-full py-3 rounded-xl font-bold" style={S.acc}>Novo Quiz</button>
    </Card>
  );
  return(
    <Card className="p-5 fade-up">
      <div className="flex justify-between items-center mb-1">
        <span className="text-xs uppercase tracking-widest" style={{color:'var(--muted)'}}>Questão</span>
        <div className="flex items-center gap-2">
          {streak>=2&&<span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:'rgba(245,158,11,.2)',color:'var(--acc)'}}>🔥 ×{streak}</span>}
          <span className="text-xs font-semibold px-3 py-1 rounded-full" style={S.surf2}>{idx+1}/{batch.length}</span>
        </div>
      </div>
      <div className="w-full rounded-full h-1 mb-5 overflow-hidden" style={{background:'var(--surf2)'}}>
        <div className="h-full rounded-full transition-all" style={{width:`${(idx/batch.length)*100}%`,background:'var(--acc)'}}/>
      </div>
      <p className="font-semibold text-sm leading-relaxed mb-5 min-h-12">{q.q}</p>
      <div className="space-y-2 mb-4">
        {q.opts.map((opt,i)=>{
          let st={...S.surf2};
          if(sel!==null){if(i===q.c)st=S.ok;else if(i===sel)st=S.err;else st={...S.surf2,opacity:.4};}
          return(
            <button key={i} onClick={()=>pick(i)}
                    className={`w-full text-left px-4 py-3.5 rounded-xl text-sm font-medium transition-all ${sel===null?'cursor-pointer':'cursor-default'}`}
                    style={st}>
              <span className="font-mono opacity-40 mr-2">{String.fromCharCode(65+i)}.</span>{opt}
            </button>
          );
        })}
      </div>
      {sel!==null&&<>
        <div className="rounded-xl p-3 mb-4 text-xs" style={sel===q.c?S.ok:S.err}>
          <p className="font-bold mb-1">{sel===q.c?'✓ Correto!':'✗ Errado'}</p>
          <p style={{color:'var(--muted)'}}>{q.exp}</p>
        </div>
        <button onClick={next} className="w-full py-3 rounded-xl font-bold" style={S.acc}>
          {idx+1>=batch.length?'Ver Resultados →':'Próxima →'}

      </>}
    </Card>
  );
}

// ── MANUAL TAB ────────────────────────────────────────────────────────────────

function ManualTab(){
  const canvasRef=useRef(null),renderTask=useRef(null),touchStart=useRef(null),areaRef=useRef(null);
  const [pdf,setPdf]=useState(null),[pageNum,setPageNum]=useState(1),[numPages,setNumPages]=useState(0);
  const [scale,setScale]=useState(null),[loading,setLoading]=useState(true),[error,setError]=useState(null);
  const [animDir,setAnimDir]=useState(1),[animKey,setAnimKey]=useState(0);
  useEffect(()=>{
    const lib=window['pdfjs-dist/build/pdf'];
    if(!lib){setError('PDF.js não carregou.');setLoading(false);return;}
    lib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    lib.getDocument('./Manual-NS.pdf').promise
      .then(doc=>{setPdf(doc);setNumPages(doc.numPages);setLoading(false);})
      .catch(e=>{setError('Erro: '+e.message);setLoading(false);});
  },[]);
  useEffect(()=>{
    if(!pdf||!canvasRef.current)return;
    if(renderTask.current)renderTask.current.cancel();
    let cancelled=false;
    async function render(){
      try{
        const page=await pdf.getPage(pageNum);if(cancelled)return;
        const Q=Math.max(window.devicePixelRatio||1,2);
        const cw=areaRef.current?.clientWidth;
        const w=(cw&&cw>0)?cw-32:window.innerWidth-32;
        const baseVp=page.getViewport({scale:1});
        const css=scale??(w/baseVp.width);
        const vp=page.getViewport({scale:css*Q});
        const canvas=canvasRef.current;if(!canvas||cancelled)return;
        canvas.width=vp.width;canvas.height=vp.height;
        canvas.style.width=(vp.width/Q)+'px';canvas.style.height=(vp.height/Q)+'px';
        renderTask.current=page.render({canvasContext:canvas.getContext('2d'),viewport:vp});
        await renderTask.current.promise;
      }catch(_){}
    }
    render();return()=>{cancelled=true;};
  },[pdf,pageNum,scale,animKey]);
  function goTo(n){const p=Math.max(1,Math.min(numPages,n));if(p===pageNum)return;setAnimDir(p>pageNum?1:-1);setAnimKey(k=>k+1);setPageNum(p);}
  function onTouchStart(e){touchStart.current=e.touches[0].clientX;}
  function onTouchEnd(e){if(touchStart.current===null)return;const dx=e.changedTouches[0].clientX-touchStart.current;touchStart.current=null;if(dx<-50)goTo(pageNum+1);if(dx>50)goTo(pageNum-1);}
  const pct=numPages?(pageNum/numPages)*100:0;
  if(loading)return(<div className="flex-1 flex flex-col items-center justify-center gap-3"><Spinner/><p className="text-sm" style={{color:'var(--muted)'}}>A carregar manual…</p></div>);
  if(error)return(<div className="flex-1 flex flex-col items-center justify-center gap-3 px-6 text-center"><span className="text-4xl">⚠️</span><p className="text-sm" style={{color:'var(--err)'}}>{error}</p></div>);
  return(
    <div className="flex-1 flex flex-col overflow-hidden">
      <div className="h-0.5 flex-shrink-0" style={{background:'var(--surf2)'}}>
        <div className="h-full rounded-full transition-all duration-300" style={{width:`${pct}%`,background:'var(--acc)'}}/>
      </div>
      <div className="flex items-center gap-2 px-4 py-2 flex-shrink-0 border-b" style={{borderColor:'var(--brd)',background:'var(--surf)'}}>
        <button onClick={()=>setScale(s=>Math.max(.4,((s??1)-.2)))} className="w-9 h-9 rounded-xl flex items-center justify-center text-lg font-bold" style={S.surf2}>−</button>
        <button onClick={()=>setScale(null)} className="flex-1 py-1.5 rounded-xl text-xs" style={{...S.surf2,color:'var(--muted)'}}>🔍 Ajustar</button>
        <button onClick={()=>setScale(s=>Math.min(4,((s??1)+.2)))} className="w-9 h-9 rounded-xl flex items-center justify-center text-lg font-bold" style={S.surf2}>+</button>
      </div>
      <div ref={areaRef} className="flex-1 overflow-auto" style={{background:'#0d0d18'}} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <div key={animKey} className={animDir>=0?'page-fwd':'page-bwd'} style={{display:'flex',justifyContent:'center',padding:'20px 16px 32px'}}>
          <canvas ref={canvasRef} style={{display:'block',borderRadius:'3px',boxShadow:'0 0 0 1px rgba(255,255,255,.05),0 8px 32px rgba(0,0,0,.7),0 32px 80px rgba(0,0,0,.5)'}}/>
        </div>
      </div>
      <div className="flex items-center gap-3 px-4 py-3 flex-shrink-0 border-t" style={{borderColor:'var(--brd)',background:'var(--surf)'}}>
        <button onClick={()=>goTo(pageNum-1)} disabled={pageNum<=1} className="w-11 h-11 rounded-xl flex items-center justify-center text-2xl disabled:opacity-20" style={S.surf2}>‹</button>
        <div className="flex-1 flex items-center justify-center gap-2">
          <input type="number" min="1" max={numPages} value={pageNum} onChange={e=>goTo(Number(e.target.value))}
                 className="w-16 text-center font-black text-sm" style={{color:'var(--acc)',padding:'6px'}}/>
          <span className="text-sm" style={{color:'var(--muted)'}}>/ {numPages}</span>
        </div>
        <button onClick={()=>goTo(pageNum+1)} disabled={pageNum>=numPages} className="w-11 h-11 rounded-xl flex items-center justify-center text-2xl disabled:opacity-20" style={S.surf2}>›</button>
      </div>
    </div>
  );
}

const IPMA_BASE='https://api.ipma.pt/open-data';

function CPRMetronome(){
  const [running,setRunning]=useState(false),[beat,setBeat]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{
    if(running)ref.current=setInterval(()=>setBeat(b=>b+1),545);
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[running]);
  return(
    <div className="text-center py-2">
      <div className="w-20 h-20 rounded-full mx-auto mb-3 flex items-center justify-center text-3xl transition-all duration-75"
           style={{...S.surf2,transform:running&&beat%2===0?'scale(1.2)':'scale(1)',
                   background:running&&beat%2===0?'rgba(244,63,94,.25)':'var(--surf2)'}}>
        {running?'❤️':'🫀'}
      </div>
      <p className="text-xs mb-3" style={{color:'var(--muted)'}}>~110 compressões/min</p>
      <button onClick={()=>setRunning(r=>!r)} className="w-full py-3 rounded-xl font-bold" style={running?S.err:S.acc}>
        {running?'⏹ Parar':'▶ Iniciar Metrónomo RCP'}
      </button>
    </div>
  );
}

function FerramentasTab({settings,onSettings}){
  const [sec,setSec]=useState('condicoes');
  const [wx,setWx]=useState(null),[uv,setUv]=useState(null),[warns,setWarns]=useState([]);
  const [loading,setLoading]=useState(false),[wxErr,setWxErr]=useState(null);

  async function fetch_wx(cityId=settings.cityId){
    setLoading(true);setWxErr(null);
    try{
      const [wRes,uvRes,warnRes]=await Promise.all([
        fetch(`${IPMA_BASE}/forecast/meteorology/cities/daily/${cityId}.json`),
        fetch(`${IPMA_BASE}/forecast/meteorology/uv/uv.json`),
        fetch(`${IPMA_BASE}/forecast/warnings/warnings_www.json`),
      ]);
      const [wJ,uvJ,warnJ]=await Promise.all([wRes.json(),uvRes.json(),warnRes.json()]);
      setWx({name:BEACH_CITIES.find(c=>c.id===cityId)?.name,d:wJ.data?.[0]});
      setUv(Array.isArray(uvJ)?uvJ.find(u=>u.globalIdLocal===cityId):null);
      setWarns(Array.isArray(warnJ)?warnJ.filter(w=>w.idAreaAviso).slice(0,3):[]);
    }catch{setWxErr('Sem acesso à API IPMA. Verifica a ligação à internet.');}
    setLoading(false);
  }

  useEffect(()=>{fetch_wx();},[settings.cityId]);
  const wt=wx?.d?.idWeatherType,wi=WEATHER_TYPE[wt]||{i:'🌡️',d:'—'};
  const wc=wx?.d?.classWindSpeed;
  const seaState=wc>=3?'Agitado 🔴':wc===2?'Moderado 🟡':'Calmo 🟢';

  const contacts=[
    {name:'INEM',tel:'112',icon:'🚑'},{name:'Capitania do Porto',tel:'213 910 900',icon:'⚓'},
    {name:'ISN',tel:'217 633 000',icon:'🛟'},{name:'GNR',tel:'112',icon:'👮'},{name:'Bombeiros',tel:'117',icon:'🚒'},
  ];

  return(
    <div className="flex-1 overflow-y-auto p-4 md:p-6">
      <PillNav tabs={[['condicoes','🌊 Condições'],['contactos','📞 Contactos']]} active={sec} onChange={setSec}/>
      {sec==='condicoes'&&(
        <div className="fade-up">
          <div className="flex items-center gap-2 mb-4">
            <select value={settings.cityId}
                    onChange={e=>{const id=Number(e.target.value);onSettings({...settings,cityId:id});fetch_wx(id);}}
                    className="flex-1 text-sm" style={{color:'var(--txt)'}}>
              {BEACH_CITIES.map(c=>(<option key={c.id} value={c.id}>{c.name}</option>))}
            </select>
            <button onClick={()=>fetch_wx()} className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={S.surf2}>
              {loading?<Spinner/>:<span>↺</span>}
            </button>
          </div>
          {wxErr&&<div className="rounded-xl p-3 mb-4 text-sm" style={S.err}>{wxErr}</div>}
          {wx?.d&&(
            <>
              <div className="grid grid-cols-2 gap-3 mb-3">
                {[
                  [wi.i,wi.d,'Condição'],
                  [`${wx.d.tMin}°–${wx.d.tMax}°`,'','Temperatura'],
                  ['💨',`${WIND_CLASS[wc]||'—'} km/h`,'Vento '+(wx.d.predWindDir||'')],
                  ['☀️',uv?`Índice ${uv.iUvMax}`:'—','UV Index'],
                  ['🌧️',`${wx.d.precipitaProb}%`,'Precipitação'],
                  ['🌊',seaState,'Mar (estimado)'],
                ].map(([ico,val,lbl],i)=>(
                  <Card key={i} className="p-3.5 text-center">
                    <p className="text-2xl mb-1">{ico}</p>
                    <p className="font-black text-sm leading-tight" style={{color:'var(--acc)'}}>{val||'—'}</p>
                    <p className="text-xs mt-0.5" style={{color:'var(--muted)'}}>{lbl}</p>
                  </Card>
                ))}
              </div>
              <p className="text-xs mb-4" style={{color:'var(--muted)'}}>Previsão {wx.d.forecastDate} · {wx.name} · fonte IPMA</p>
            </>
          )}
          {!wx?.d&&!loading&&!wxErr&&(
            <div className="text-center py-8" style={{color:'var(--muted)'}}>
              <p className="text-3xl mb-2">🌊</p>
              <p className="text-sm">Clica ↺ para carregar a previsão</p>
            </div>
          )}
          {warns.length>0&&(
            <div>
              <p className="text-xs uppercase tracking-widest mb-3" style={{color:'var(--muted)'}}>Avisos IPMA Ativos</p>
              {warns.map((w,i)=>(
                <Card key={i} className="p-3 mb-2">
                  <div className="flex items-start gap-2">
                    <span>⚠️</span>
                    <div>
                      <p className="text-xs font-bold" style={{color:'var(--warn)'}}>{w.awarenessTypeName||'Aviso meteorológico'}</p>
                      <p className="text-xs mt-0.5" style={{color:'var(--muted)'}}>{w.idAreaAviso||''} · nível {w.awarenessLevelID||'?'}</p>
                    </div>
                  </div>
                </Card>
              ))}
            </div>
          )}
        </div>
      )}
      {sec==='contactos'&&(
        <div className="fade-up">
          <Card className="p-4 mb-4">
            <p className="font-bold mb-3">📞 Contactos de Emergência</p>
            {contacts.map(c=>(
              <a key={c.name} href={`tel:${c.tel.replace(/\s/g,'')}`}
                 className="flex items-center gap-3 py-3 border-b last:border-0 transition-opacity hover:opacity-75"
                 style={{borderColor:'var(--brd)'}}>
                <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" style={S.surf2}>{c.icon}</div>
                <div className="flex-1"><p className="text-sm font-semibold">{c.name}</p><p className="text-xs" style={{color:'var(--acc)'}}>{c.tel}</p></div>
                <span style={{color:'var(--ok)'}}>📲</span>
              </a>
            ))}
          </Card>
          <Card className="p-4">
            <p className="font-bold mb-4">⏱️ Metrónomo RCP</p>
            <CPRMetronome/>
          </Card>
        </div>
      )}
    </div>
  );
}

        ))}
      </nav>
      <div className="px-3 pb-5 pt-4 border-t" style={{borderColor:'var(--brd)'}}>
        <div className="rounded-xl p-3.5 border" style={{...S.surf,borderColor:'var(--brd)'}}>
          <div className="flex items-center gap-2.5 mb-3">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center text-base flex-shrink-0" style={S.surf2}>{cur.icon}</div>
            <div className="flex-1 min-w-0">
              <p className={`text-xs font-bold truncate ${cur.cls}`}>{cur.label}</p>
              <p className="text-xs" style={{color:'var(--muted)'}}>{profile.pts} pts</p>
            </div>
          </div>
          <div className="w-full rounded-full h-1.5 overflow-hidden" style={{background:'var(--surf2)'}}>
            <div className="h-full rounded-full" style={{width:`${pct}%`,background:'var(--acc)'}}/>
          </div>
          {next&&<p className="text-xs mt-1.5 truncate" style={{color:'var(--muted)'}}>{next.minPts-profile.pts} pts → {next.label}</p>}
        </div>
      </div>
    </aside>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────

function App(){
  const [tab,setTab]=useState('formacao');
  const [profile,setProfile]=useState(loadProfile);
  const [settings,setSettings]=useState(loadSettings);
  const [isDark,setIsDark]=useState(()=>localStorage.getItem('nspro_theme')!=='light');

  useEffect(()=>{
    document.documentElement.classList.toggle('light',!isDark);
    localStorage.setItem('nspro_theme',isDark?'dark':'light');
  },[isDark]);

  function updateProfile(p){setProfile(p);saveProfile(p);}
  function updateSettings(s){setSettings(s);saveSettings(s);}
  function resetProgress(){updateProfile({...profile,pts:0,completedModules:[],completedQuestions:[]});}

  const cur=getLevel(profile.pts);
  const tabMeta=[...MAIN_TABS,...EXTRA_TABS].find(t=>t.id===tab);

  function renderContent(){
    switch(tab){
      case 'formacao':    return <FormacaoTab profile={profile} onUpdate={updateProfile}/>;
      case 'manual':      return <ManualTab/>;
      case 'operacional': return <OperacionalTab/>;
      case 'ferramentas': return <FerramentasTab settings={settings} onSettings={updateSettings}/>;
      case 'perfil':      return <PerfilTab profile={profile} onUpdate={updateProfile}/>;
      case 'definicoes':  return <DefinicoesTab isDark={isDark} onTheme={setIsDark} settings={settings} onSettings={updateSettings} onReset={resetProgress}/>;
      case 'videos':      return <Placeholder icon="🎬" title="Biblioteca de Vídeos" sub="Técnicas de salvamento, SBV e manutenção em vídeo. Em breve."/>;
      default: return null;
    }
  }

  return(
    <div className="flex h-full" style={{background:'var(--bg)'}}>
      <Sidebar active={tab} onChange={setTab} profile={profile}/>
      <div className="flex flex-col flex-1 overflow-hidden min-w-0">
        {/* Mobile header */}
        <header className="md:hidden flex items-center justify-between px-4 flex-shrink-0 border-b"
                style={{paddingTop:'max(2.5rem,env(safe-area-inset-top))',paddingBottom:'.75rem',
                        borderColor:'var(--brd)',background:'var(--surf)'}}>
          <div className="flex items-center gap-2">
            <span className="text-xl">🛟</span>
            <span className="font-black text-xl">NS<span style={{color:'var(--acc)'}}>PRO</span></span>
          </div>
          <div className="flex items-center gap-1.5">
            <button onClick={()=>setTab('perfil')} className="w-9 h-9 rounded-xl flex items-center justify-center"
                    style={tab==='perfil'?S.acc:S.surf2}>👤</button>
            <button onClick={()=>setTab('definicoes')} className="w-9 h-9 rounded-xl flex items-center justify-center"
                    style={tab==='definicoes'?S.acc:S.surf2}>⚙️</button>
          </div>
        </header>
        {/* Desktop topbar */}
        <header className="hidden md:flex items-center px-6 py-3.5 flex-shrink-0 border-b"
                style={{borderColor:'var(--brd)',background:'var(--surf)'}}>
          <div className="flex items-center gap-2">
            <span>{tabMeta?.icon}</span>
            <h1 className="font-bold">{tabMeta?.label}</h1>
          </div>
          <div className="ml-auto flex items-center gap-3 rounded-xl px-4 py-2 border" style={S.surf2}>
            <span>{cur.icon}</span>
            <span className={`text-sm font-semibold ${cur.cls}`}>{cur.label}</span>
            <span style={{color:'var(--brd)'}}>·</span>
            <span className="text-sm font-black" style={{color:'var(--acc)'}}>{profile.pts} pts</span>
          </div>
        </header>
        <main className="flex-1 overflow-hidden flex flex-col">{renderContent()}</main>
        {/* Mobile bottom tabs */}
        <nav className="md:hidden flex border-t flex-shrink-0"
             style={{borderColor:'var(--brd)',background:'var(--surf)',paddingBottom:'env(safe-area-inset-bottom)'}}>
          {MAIN_TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
                    className="flex-1 flex flex-col items-center py-2.5 transition-colors"
                    style={tab===t.id?{color:'var(--acc)'}:{color:'var(--muted)'}}>
              <span className="text-xl leading-none mb-0.5">{t.icon}</span>
              <span className="font-medium" style={{fontSize:'.58rem'}}>{t.label}</span>
              {tab===t.id&&<div className="w-4 h-0.5 rounded-full mt-1" style={{background:'var(--acc)'}}/>}
            </button>
          ))}
        </nav>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testes NS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:'DM Sans',sans-serif;background:#061426;color:#fff;min-height:100%;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,20,38,0.98);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 20px;height:52px;gap:10px;}
.tb-brand{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:7px;}
.tb-brand span{background:#c0392b;padding:2px 7px;border-radius:4px;font-size:11px;}
.tb-spacer{flex:1;}
.tb-user{display:flex;align-items:center;gap:8px;}
.tb-avatar{width:28px;height:28px;border-radius:50%;background:#c0392b;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.tb-name{font-size:13px;color:rgba(255,255,255,0.7);}
.tb-logout{font-size:11px;color:rgba(255,255,255,0.3);cursor:pointer;padding:4px 8px;border-radius:5px;border:none;background:none;}
.tb-logout:hover{color:#fff;background:rgba(255,255,255,0.08);}
.tb-login-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.tb-login-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.tb-login-btn svg{flex-shrink:0;}

/* SCREENS */
.screen{display:none;}
.screen.active{display:block;}

/* DASHBOARD */
.dash-wrap{max-width:780px;margin:0 auto;padding:28px 20px 60px;}
.dash-hero{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px 28px;margin-bottom:24px;display:flex;align-items:center;gap:24px;}
.hero-num{font-family:'Bebas Neue',sans-serif;font-size:68px;line-height:1;flex-shrink:0;}
.hero-right{flex:1;min-width:0;}
.hero-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4px;}
.hero-level{font-size:17px;font-weight:500;margin-bottom:10px;}
.bar-wrap{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .7s ease;}
.hero-desc{font-size:12px;color:rgba(255,255,255,0.35);margin-top:7px;}

.sec-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:12px;}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:11px;margin-bottom:24px;}
.ch-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.ch-card:hover:not(.locked){background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.18);transform:translateY(-2px);}
.ch-card.locked{opacity:0.4;cursor:not-allowed;}
.ch-lock{position:absolute;top:14px;right:14px;font-size:15px;opacity:0.5;}
.ch-cap{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:5px;}
.ch-title{font-family:'Bebas Neue',sans-serif;font-size:19px;color:#fff;margin-bottom:4px;}
.ch-desc{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5;margin-bottom:12px;}
.ch-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ch-r{font-size:12px;font-weight:600;}
.ch-r.rn{color:rgba(255,255,255,0.25);}
.ch-count{font-size:11px;color:rgba(255,255,255,0.28);}
.ch-prog{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.ch-prog-fill{height:100%;border-radius:2px;transition:width .5s;}
.ch-last{font-size:11px;color:rgba(255,255,255,0.22);margin-top:7px;}
.badge-soon{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.28);margin-top:6px;}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.action-btn{display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;transition:all .18s;text-align:left;width:100%;}
.action-btn:hover:not(:disabled){background:rgba(255,255,255,0.09);transform:translateY(-1px);}
.action-btn:disabled{opacity:0.35;cursor:not-allowed;}
.action-btn.primary{background:rgba(192,57,43,0.18);border-color:rgba(192,57,43,0.3);}
.action-btn.primary:hover{background:rgba(192,57,43,0.26);}
.action-icon{font-size:22px;flex-shrink:0;}
.action-label{font-size:13px;font-weight:600;}
.action-desc{font-size:11px;color:rgba(255,255,255,0.38);margin-top:2px;}

/* QUIZ */
.quiz-wrap{max-width:680px;margin:0 auto;padding:24px 20px 60px;}
.quiz-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,0.45);cursor:pointer;border:none;background:none;padding:4px 0;flex-shrink:0;}
.back-btn:hover{color:#fff;}
.quiz-info{flex:1;min-width:0;}
.quiz-ch{font-size:13px;color:rgba(255,255,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mode-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:rgba(192,57,43,0.2);color:#f1948a;margin-left:6px;}
.quiz-timer{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:#fff;flex-shrink:0;}
.quiz-timer.warn{color:#e74c3c;}

.q-prog{display:flex;align-items:center;gap:10px;margin-bottom:26px;}
.q-bar{flex:1;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.q-fill{height:100%;background:#c0392b;border-radius:2px;transition:width .3s;}
.q-ctr{font-size:12px;color:rgba(255,255,255,0.32);white-space:nowrap;}

.q-num{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:9px;}
.q-text{font-size:16px;font-weight:500;color:#fff;line-height:1.65;margin-bottom:20px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{padding:12px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:9px;cursor:pointer;font-size:14px;color:rgba(255,255,255,0.78);background:rgba(255,255,255,0.04);text-align:left;transition:all .14s;line-height:1.45;display:flex;gap:11px;align-items:flex-start;}
.opt:hover:not(:disabled){background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.18);}
.opt:disabled{cursor:default;}
.opt.correct{background:rgba(88,214,141,0.11);border-color:rgba(88,214,141,0.32);color:#82e0aa;}
.opt.wrong{background:rgba(192,57,43,0.11);border-color:rgba(192,57,43,0.32);color:#f1948a;}
.opt.show-correct{background:rgba(88,214,141,0.07);border-color:rgba(88,214,141,0.2);color:#82e0aa;}
.opt-ltr{font-weight:700;font-size:11px;flex-shrink:0;width:19px;height:19px;border-radius:4px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;margin-top:2px;}
.opt.correct .opt-ltr{background:rgba(88,214,141,0.18);}
.opt.wrong .opt-ltr{background:rgba(192,57,43,0.18);}
.opt.show-correct .opt-ltr{background:rgba(88,214,141,0.13);}
.q-fb{margin-top:13px;padding:11px 15px;border-radius:8px;font-size:13px;line-height:1.6;display:none;}
.q-fb.ok{background:rgba(88,214,141,0.09);border:1px solid rgba(88,214,141,0.22);color:#82e0aa;}
.q-fb.err{background:rgba(192,57,43,0.09);border:1px solid rgba(192,57,43,0.22);color:#f1948a;}
.q-next{margin-top:14px;padding:11px 22px;border-radius:8px;border:none;background:#c0392b;color:#fff;font-size:14px;font-weight:500;cursor:pointer;display:none;}
.q-next:hover{background:#a93226;}

/* RESULTS */
.res-wrap{max-width:660px;margin:0 auto;padding:32px 20px 60px;text-align:center;}
.score-ring{margin:0 auto 18px;width:136px;height:136px;position:relative;}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
circle{fill:none;stroke-width:8;}
.ring-bg{stroke:rgba(255,255,255,0.07);}
.ring-fg{stroke:#c0392b;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.ring-fg.g{stroke:#58d68d;}
.ring-fg.y{stroke:#f39c12;}
.ring-fg.gold{stroke:#f1c40f;}
.score-inside{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-pct{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;}
.score-sub{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;}
.res-level{font-size:16px;font-weight:500;margin-bottom:5px;}
.res-msg{font-size:13px;color:rgba(255,255,255,0.42);margin-bottom:24px;}
.stats-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.stat-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:13px 18px;min-width:90px;}
.stat-v{font-size:20px;font-weight:600;color:#fff;}
.stat-l{font-size:10px;color:rgba(255,255,255,0.32);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.wrong-sec{text-align:left;margin-bottom:24px;}
.wrong-ttl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:11px;}
.wrong-item{padding:11px 14px;background:rgba(192,57,43,0.07);border:1px solid rgba(192,57,43,0.14);border-radius:8px;margin-bottom:7px;font-size:13px;line-height:1.5;color:rgba(255,255,255,0.68);}
.wrong-ans{font-size:12px;color:#82e0aa;margin-top:3px;}
.r-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
.btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.13);background:rgba(255,255,255,0.06);color:#fff;transition:all .14s;}
.btn:hover{background:rgba(255,255,255,0.11);}
.btn-red{background:#c0392b;border-color:#c0392b;}
.btn-red:hover{background:#a93226;}

.hidden{display:none!important;}
@media(max-width:500px){.action-grid{grid-template-columns:1fr;}.dash-hero{flex-direction:column;text-align:center;}.hero-num{font-size:52px;}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-brand"><span>NS</span> Testes</div>
  <div class="tb-spacer"></div>
  <div id="auth-area"></div>
</div>

<!-- DASHBOARD -->
<div class="screen active" id="screen-dash">
  <div class="dash-wrap">
    <div class="dash-hero">
      <div class="hero-num" id="hero-num" style="color:#444;">—</div>
      <div class="hero-right">
        <div class="hero-lbl">Preparação Geral</div>
        <div class="hero-level" id="hero-level">Ainda sem dados</div>
        <div class="bar-wrap"><div class="bar-fill" id="hero-bar" style="width:0%;background:#333;"></div></div>
        <div class="hero-desc" id="hero-desc">Completa um quiz para ver a tua preparação.</div>
      </div>
    </div>
    <div class="sec-title">Capítulos</div>
    <div class="ch-grid" id="ch-grid"></div>
    <div class="sec-title">Modos de Treino</div>
    <div class="action-grid">
      <button class="action-btn primary" onclick="startExam()">
        <span class="action-icon">🎯</span>
        <div><div class="action-label">Exame Simulado</div><div class="action-desc">30 perguntas · 30 min · sem feedback</div></div>
      </button>
      <button class="action-btn" id="btn-review" onclick="startReview()" disabled>
        <span class="action-icon">📋</span>
        <div><div class="action-label">Rever Erros</div><div class="action-desc" id="review-desc">Sem erros registados</div></div>
      </button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-wrap">
    <div class="quiz-hdr">
      <button class="back-btn" onclick="goHome()">← Voltar</button>
      <div class="quiz-info">
        <span id="quiz-ch-lbl"></span>
        <span class="mode-badge" id="mode-badge"></span>
      </div>
      <div class="quiz-timer hidden" id="quiz-timer">30:00</div>
    </div>
    <div class="q-prog">
      <div class="q-bar"><div class="q-fill" id="q-fill" style="width:0%"></div></div>
      <div class="q-ctr" id="q-ctr">1 / 30</div>
    </div>
    <div class="q-num" id="q-num">Pergunta 1 de 30</div>
    <div class="q-text" id="q-text"></div>
    <div class="opts" id="opts"></div>
    <div class="q-fb" id="q-fb"></div>
    <button class="q-next" id="q-next" onclick="nextQ()">Próxima →</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="screen-results">
  <div class="res-wrap">
    <div class="score-ring">
      <svg viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="52"/>
        <circle class="ring-fg" id="ring-fg" cx="60" cy="60" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="score-inside">
        <div class="score-pct" id="r-pct">0%</div>
        <div class="score-sub">Score</div>
      </div>
    </div>
    <div class="res-level" id="r-level"></div>
    <div class="res-msg" id="r-msg"></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-v" id="r-correct"></div><div class="stat-l">Corretas</div></div>
      <div class="stat-box"><div class="stat-v" id="r-wrong-n"></div><div class="stat-l">Erros</div></div>
      <div class="stat-box"><div class="stat-v" id="r-time"></div><div class="stat-l">Tempo</div></div>
      <div class="stat-box"><div class="stat-v" id="r-pts"></div><div class="stat-l">Pontos</div></div>
    </div>
    <div class="wrong-sec hidden" id="wrong-sec">
      <div class="wrong-ttl">Perguntas que erraste</div>
      <div id="wrong-list"></div>
    </div>
    <div class="r-btns">
      <button class="btn" onclick="goHome()">Início</button>
      <button class="btn btn-red" onclick="retryQuiz()">Repetir</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const SB_URL = 'https://tzleanbmyanpkbqueovy.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6bGVhbmJteWFucGticXVlb3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Mjg0ODIsImV4cCI6MjA5NjAwNDQ4Mn0.-_nXcqTvRuX1Dvi9FgmRFMtMCxUfpra6C6GYauv5ArM';
const LS_KEY = 'ns_quiz_v1';

// ── QUESTION DATA ──
const CHAPTERS = {
  c3:{id:'c3',label:'Capítulo 3',title:'O Afogamento',desc:'Definição, fases, classificação por graus, temperatura da água.',questions:[
    {q:"O que é o Afogamento?",pts:5,opts:["É o processo que resulta em insuficiência respiratória por imersão ou submersão em meio líquido","É o processo que resulta em insuficiência cardíaca por imersão ou submersão em meio líquido","É o processo que resulta em insuficiência cerebral por imersão ou submersão em meio líquido","É o processo que resulta em insuficiência cardio-celular por imersão ou submersão em meio líquido"],c:0,exp:"O afogamento é o processo que resulta em insuficiência respiratória primária por imersão ou submersão em meio líquido (OMS, 2002)."},
    {q:"Quais são as consequências do afogamento?",pts:6,opts:["Morte, rigidez e ausência de rigidez","Morte, óbito e ausência de morte","Morte, morbidez e ausência de morbidez","Apneia voluntária, aspiração do líquido, apneia terminal e espasmo glótico"],c:2,exp:"As consequências do afogamento são: morte (imediata ou após ressuscitação), morbidez (sobrevivência com lesão permanente) e ausência de morbidez (sobrevivência sem lesão)."},
    {q:"O organismo humano consegue sobreviver em situações adversas extremas até cerca de?",pts:5,opts:["5 minutos sem oxigénio","5 minutos sem proteção e abrigo","3 minutos sem oxigénio e 3 horas sem proteção e abrigo","3 minutos sem oxigénio e 3 dias sem comida"],c:2,exp:"3 minutos sem oxigénio · 3 horas sem proteção e abrigo · 3 dias sem água · 3 semanas sem comida."},
    {q:"A hipóxia ocorre devido a:",pts:5,opts:["Oxigénio a mais no cérebro","Falta de sangue no cérebro","Diminuição de oxigénio no sangue","Oxigénio a mais no sangue"],c:2,exp:"A hipóxia é a diminuição de oxigénio no sangue/tecidos. A anóxia é a ausência total de oxigénio."},
    {q:"Quais são as fases que caracterizam o afogamento?",pts:5,opts:["Apneia voluntária, aspiração inicial de líquido, apneia terminal e espasmo glótico","É a apneia involuntária, aspiração inicial, apneia e espasmo glótico","É a entrada de água nos pulmões, paragem do coração e falência cerebral","É a apneia voluntária, aspiração final de líquido e espasmo pulmonar"],c:0,exp:"As 4 fases são: Apneia voluntária → Aspiração inicial de líquido → Apneia terminal → Espasmo glótico."},
    {q:"Em que fase do afogamento a vítima encontra-se em pânico total e luta para se manter à superfície (10 a 60 segundos)?",pts:5,opts:["Apneia voluntária","Aspiração inicial de líquido","Espasmo glótico","Todas as respostas estão corretas"],c:0,exp:"A apneia voluntária é a 1ª fase — pânico total, luta para se manter à superfície, dura 10–60 segundos."},
    {q:"A vítima começa a perder forças, existe aspiração de maior quantidade de líquido. Qual a fase que pode durar 60 a 90 segundos?",pts:6,opts:["Apneia terminal","Espasmo glótico","Aspiração inicial de líquido","Apneia voluntária"],c:2,exp:"A aspiração inicial de líquido é a 2ª fase — 60 a 90 segundos."},
    {q:"Em que fase do afogamento acontece a inconsciência da vítima? (Há água nos pulmões e estômago)",pts:5,opts:["Apneia voluntária","Espasmo glótico","Apneia terminal","Aspiração inicial do líquido"],c:2,exp:"A apneia terminal é a 3ª fase — inconsciência, água nos pulmões. Dura 90 segundos a 3 minutos."},
    {q:"Em que fase a vítima não faz qualquer movimento e continua a fazer grandes aspirações de água para o pulmão?",pts:5,opts:["Aspiração inicial de líquido","Apneia voluntária","Espasmo glótico","Apneia terminal"],c:2,exp:"O espasmo glótico é a 4ª fase — vítima sem movimento, grandes aspirações, PCR iminente."},
    {q:"Em que fase do afogamento a vítima não faz qualquer tipo de movimento?",pts:5,opts:["Apneia voluntária","Aspiração inicial de líquido","Espasmo glótico","Todas as respostas estão corretas"],c:2,exp:"No espasmo glótico a vítima não faz qualquer tipo de movimento."},
    {q:"Na classificação do afogamento, qual o grau sem tosse, sem espuma, sem dificuldade respiratória e sem PCR?",pts:5,opts:["Grau 1","Grau 2","Resgate aquático","Grau 4"],c:2,exp:"O Resgate Aquático é quando não há tosse, nem espuma, nem dificuldade respiratória, nem PCR."},
    {q:"Quais os sintomas de um náufrago afogado em grau 2?",pts:5,opts:["Pouca espuma na boca e/ou nariz","Pouca espuma na boca","Muita espuma na boca e/ou nariz","Muita espuma na boca"],c:0,exp:"Grau 2: pouca espuma na boca e/ou nariz. Procedimento: O₂ nasal 5L/min, aquecimento, observação hospitalar 6–24h."},
    {q:"Quais os sintomas de um náufrago afogado em grau 4?",pts:5,opts:["Pouca espuma na boca e/ou nariz","Pouca espuma na boca","Muita espuma na boca e/ou nariz sem pulso periférico palpável","Muita espuma na boca e/ou nariz com pulso periférico palpável"],c:2,exp:"Grau 4: muita espuma na boca e/ou nariz SEM pulso periférico palpável."},
    {q:"Na classificação de afogamento grau 3, como se apresenta o náufrago e quais os procedimentos?",pts:5,opts:["Pouca espuma, O₂ a 15L/min, PLS e aquecimento","Muita espuma com pulso periférico palpável, O₂ a 15L/min, PLS e internamento hospitalar","Pouca espuma; O₂ nasal a 5L/min, aquecimento, repouso e observação hospitalar","Muita espuma sem pulso periférico, O₂ a 15L/min, PLS e internamento hospitalar"],c:1,exp:"Grau 3: muita espuma COM pulso periférico palpável. O₂ máscara 15L/min, PLS, internamento UCI."},
    {q:"Em que grau a vítima se encontra em paragem cardiorrespiratória (PCR)?",pts:6,opts:["Grau 5","Grau 1 e grau 2","Grau 4","Grau 6"],c:3,exp:"Grau 6: paragem cardiorrespiratória (PCR). Procedimento: RCP 2 ventilações + 30 compressões."},
    {q:"Quais os perigos associados à temperatura da água?",pts:6,opts:["Hidrocussão e Hipertermia","Hipotermia e paragem digestiva","Hipotermia e Hidrocussão","Todas as respostas anteriores estão certas"],c:2,exp:"Os perigos associados à temperatura da água são a Hipotermia e a Hidrocussão (síndrome de imersão)."},
    {q:"Que nome se dá ao acidente provocado pela súbita exposição à água com temperatura 5°C abaixo da temperatura corporal?",pts:6,opts:["Hipotermia ou hidrocussão","Hipotermia ou síndrome de imersão","Hidrocussão ou síndrome de imersão","Hipotermia moderada ou hidrocussão"],c:2,exp:"Hidrocussão ou síndrome de imersão — choque termodiferencial por exposição súbita a água 5ºC abaixo da temperatura corporal."},
    {q:"A hipotermia ocorre quando a temperatura corporal baixa para além dos?",pts:5,opts:["35°C","32°C","38°C","Limites"],c:0,exp:"A hipotermia ocorre quando a temperatura corporal baixa para além dos 35ºC."},
    {q:"Qual o tempo médio de sobrevivência de um náufrago exposto a uma temperatura da água de 21°C?",pts:5,opts:["24 horas","48 horas","2 a 3 dias","Nunca mais de 2 dias"],c:0,exp:"Segundo a Tabela de Jolly, a 21ºC a sobrevivência média é de 24 horas."}
  ]},
  c4:{id:'c4',label:'Capítulo 4',title:'Praias',desc:'Ondas, correntes, marés, material e sinalética.',questions:[
    {q:"Quando a frente de praia tem extensão igual ou superior a 100 metros, quantos NS é obrigatório manter?",pts:4,opts:["Um NS por cada 50 metros","Dois NS por cada 50 metros","Um NS por cada 25 metros","Nenhumas destas respostas estão corretas"],c:0,exp:"Se a frente de praia ≥100m, é obrigatório 1 NS por cada 50 metros."},
    {q:"Ao período de acalmia entre cada set, dá-se o nome de?",pts:4,opts:["Mar chão","Correntes de maré","Sota","Correntes de mar"],c:2,exp:"Sota é o período de acalmia entre cada set (mar total)."},
    {q:"De quem é a responsabilidade de içar a bandeira, conforme a avaliação do estado do mar?",pts:3,opts:["Nadador-Salvador","Concessionário","Banhista","Todas as respostas estão corretas"],c:0,exp:"É da responsabilidade do Nadador-Salvador içar a bandeira correta conforme as condições do mar."},
    {q:"Para delimitar a área de banhos, que cores têm as duas bandeirolas colocadas próximo da linha de água?",pts:4,opts:["Amarela e Laranja","Vermelha e Amarela","Xadrez de Preto e Branco","Verde e Amarela"],c:3,exp:"As bandeirolas de zona de banhos são de cor amarela (duas bandeirolas amarelas)."},
    {q:"Quais os sinais indicadores de estar na presença de uma 'rip current', agueiro ou golas?",pts:3,opts:["Ondas maiores e mais frequentes nos dois lados desta corrente","Tremura da água no agueiro quando à sua volta é lisa","Cor da água acastanhada devido ao arrastamento da areia do fundo","Todas as respostas estão corretas"],c:3,exp:"Todos são indicadores de um agueiro: ondas maiores nos lados, tremura da água, cor acastanhada."},
    {q:"De quem é a responsabilidade da aquisição dos materiais e equipamentos destinados à assistência a banhistas numa ZAB?",pts:3,opts:["Da Autoridade Marítima","Do Nadador Salvador","Do Instituto de Socorros a Náufragos","Do Concessionário"],c:3,exp:"A aquisição dos materiais e equipamentos é da responsabilidade do Concessionário da ZAB."},
    {q:"O retorno ao mar da água das ondas causa correntes normalmente mais fortes onde a praia tem o gradiente mais acentuado. Que tipo de correntes?",pts:3,opts:["Correntes alternas","Correntes amovíveis","Correntes de maré","Correntes de mar"],c:3,exp:"São as correntes de mar — o retorno ao mar da água causa correntes mais fortes em praias com gradiente acentuado."},
    {q:"A água transportada para a praia acumula-se e procura retornar para o mar aberto na zona de maior profundidade. Que tipo de correntes?",pts:3,opts:["Agueiros ou 'Rip Current'","Correntes amovíveis","Correntes de maré","Correntes de mar"],c:0,exp:"São os agueiros (rip currents) — correntes de retorno quando a água acumulada na praia regressa ao mar pela zona de maior profundidade."},
    {q:"Classifique as correntes nas praias fluviais:",pts:4,opts:["Retornos, Funil, Agueiros","Funil ou Escoadouro, Corrente de Mar","Agueiros, Retornos, Remoinhos","Remoinhos, Retornos, Funil ou Escoadouro"],c:3,exp:"As correntes nas praias fluviais classificam-se em: Remoinhos, Retornos e Funil ou Escoadouro."},
    {q:"Que bandeira indica 'condições aceitáveis para a prática de banhos, assumindo as regras e recomendações de segurança'?",pts:4,opts:["Bandeira amarela","Bandeira vermelha","Bandeira azul","Bandeira verde"],c:0,exp:"A bandeira amarela significa condições perigosas para natação mas aceitáveis para banhos assumindo as regras de segurança."},
    {q:"O que entende por mar total (set)?",pts:3,opts:["É um conjunto de sete ondas que vai aumentando de tamanho","Ondas geradas pelo vento com aspeto mais ou menos regular","Sobreposição de grupos de ondas geradas pelo vento na superfície do mar","Ondas que se propagam para fora da zona de geração com aspeto regular"],c:2,exp:"Mar total (SET) é a sobreposição de grupos de ondas (ondulação e vaga) geradas pelo vento na superfície do mar."},
    {q:"A onda mergulhante caracteriza-se por:",pts:3,opts:["Onda que rebenta sempre com força, pode atirar um nadador para o fundo e ocorre na maré baixa","Onda que rebenta com muita força, enrola facilmente um nadador e ocorre na preia-mar","Onda que rebenta à frente da sua crista e ocorre na vazante","Onda que surge quando o mar fica encrespado e ocorre na enchente"],c:0,exp:"A onda mergulhante rebenta sempre com força, pode atirar para o fundo, e ocorre na maré baixa."},
    {q:"Do seguinte material, qual não é obrigatório no posto de praia?",pts:3,opts:["Carretel e mastro de sinais","Mala de 1° socorros","Binóculos e telemóvel","Bandeiras de sinais"],c:2,exp:"Binóculos e telemóvel são material complementar (não obrigatório)."},
    {q:"A bandeira xadrez tem as seguintes cores:",pts:3,opts:["Preto e branco","Vermelho e amarelo","Azul e branca","Vermelho e branco"],c:0,exp:"A bandeira xadrez é de preto e branco — indica praia temporariamente sem vigilância."},
    {q:"Ao conceito de onda associam-se três conceitos que o NS deve conhecer. Quais são?",pts:3,opts:["Comprimento da onda, período da onda e amplitude de onda","A vaga, ondulação e mar total (SET)","Onda mergulhante, onda progressiva e onda espraiada","Correntes de mar, correntes de maré e agueiros"],c:0,exp:"Os 3 conceitos associados à onda são: comprimento, período e amplitude."},
    {q:"O NS perante um cenário de nevoeiro, que bandeira deve içar?",pts:3,opts:["Verde, se as condições de mar estivessem boas","Amarela, porque existe algum perigo","Vermelha, porque é uma situação de risco","Aquela que as condições de mar assim exigirem"],c:3,exp:"Perante nevoeiro, o NS deve içar a bandeira que as condições de mar exigirem — o nevoeiro não determina por si só a bandeira."},
    {q:"Nas praias fluviais: '...a água a cair de um obstáculo forma uma corrente de retorno sobre ele próprio...'. De que perigo se trata?",pts:3,opts:["Remoinhos","Funil ou escoadouro","Agueiros","Retornos"],c:3,exp:"Retornos — a água a cair de um obstáculo forma uma corrente de retorno sobre ele próprio."},
    {q:"A maré de quadratura ou maré morta ocorre quando:",pts:4,opts:["O Sol e a Lua estão alinhados com a Terra","Após 12 horas de preia-mar","A Terra completa uma volta no seu próprio eixo","A Lua e o Sol estão posicionados num ângulo de 90º com a Terra"],c:3,exp:"A maré de quadratura (maré morta) ocorre quando a Lua e o Sol estão a 90° com a Terra."},
    {q:"Onda que apenas rebenta quando chega à linha de praia, devido a uma grande profundidade de água, denomina-se por:",pts:3,opts:["Onda mergulhante","Onda espraiada","Em todo o tipo de ondas","Onda progressiva"],c:3,exp:"A onda progressiva propaga-se sem grande alteração de forma. Rebenta à frente da sua crista, surge na vazante."},
    {q:"O cercado de proteção serve para cercar todo o material que faz parte do posto de praia. Quantos metros tem?",pts:3,opts:["6 metros quadrados","5 metros quadrados","2,5 metros quadrados","Quatro metros quadrados"],c:1,exp:"O cercado de proteção tem um espaço de 5m²."},
    {q:"Quais são os fatores que influenciam o declive numa praia marítima?",pts:3,opts:["O tamanho das partículas de sedimentos e a intensidade da ação das ondas","O tamanho e a intensidade da ação das ondas","O tamanho e a intensidade das ondas, assim como o tipo de areia","O vento, as ondas, tipo de areia e o fundo"],c:0,exp:"Os fatores que influenciam o declive são: o tamanho das partículas de sedimentos e a intensidade da ação das ondas."},
    {q:"Que tipos de agueiros conhece?",pts:3,opts:["Os estacionários, móveis e súbitos","Os estacionários, os móveis e 'ripcurrent'","Os móveis e os imóveis","Os perigosos e os não perigosos"],c:0,exp:"Os tipos de agueiros são: estacionários (fundo rochoso), móveis (fundo arenoso) e súbitos (aparecem subitamente)."},
    {q:"Quais são os materiais complementares ao posto de praia que não são obrigatórios?",pts:3,opts:["Cercado de proteção, boia torpedo, cinto de salvamento e bandeiras de sinais","Prancha, carretel, vara e mala de 1° socorros","Boia circular, boia torpedo e armação de praia","Mota de água, viatura 4x4, embarcação de pequeno porte, moto 4x4 e apito"],c:3,exp:"Os materiais complementares (não obrigatórios) incluem mota de água, viatura 4x4, embarcação e moto 4x4."},
    {q:"Os agueiros podem ser?",pts:3,opts:["Móveis quando aparecem subitamente, podendo ser muito fortes","Estacionários quando estão no mesmo local todo o ano, devido ao seu fundo arenoso","Móveis quando mudam de local diariamente, sendo extremamente perigosos","Estacionários quando o fundo é rochoso, mantêm-se permanentes ao longo do ano"],c:3,exp:"Estacionários quando o fundo é rochoso — mantêm-se no mesmo local. Móveis quando mudam ao longo de um segmento de praia."},
    {q:"Como é medida a amplitude (altura) da onda?",pts:3,opts:["Medida do distúrbio máximo durante um ciclo completo de oscilação","É medida em relação à linha de equilíbrio da onda","É medida em metros","Todas as respostas estão corretas"],c:3,exp:"A amplitude é medida do distúrbio máximo durante um ciclo completo de oscilação, em relação à linha de equilíbrio, em metros."},
    {q:"Em Portugal, ocorrem duas marés altas e 2 marés baixas por dia, com intervalo de cerca de?",pts:3,opts:["12h25m entre a maré alta e a maré baixa e 6h12m entre duas marés altas consecutivas","Só existe uma maré baixa e uma maré alta","6h12m entre cada maré alta e maré baixa e 24h50m entre 2 marés altas consecutivas","6h12m entre cada maré alta e baixa e 12h25m entre 2 marés altas consecutivas"],c:3,exp:"Em Portugal: 6h12m entre maré alta e baixa · 12h25m entre duas marés altas consecutivas."},
    {q:"Qual a cor das bandeirolas de zona de banhos?",pts:3,opts:["Vermelha e Amarela","Amarela e verde","Vermelha","Amarela"],c:3,exp:"As bandeirolas de zona de banhos são de cor amarela."},
    {q:"Quando a crista da onda rebenta à frente da mesma e surge principalmente na vazante. Que tipo de onda?",pts:3,opts:["Onda progressiva","Onda mergulhante","Onda de maré","Onda espraiada"],c:0,exp:"A onda progressiva rebenta à frente da sua crista e surge principalmente na vazante."},
    {q:"O posto de praia é instalado nas ZAB nos termos determinados por?",pts:3,opts:["O Instituto de Socorros a Náufragos","O Edital da Capitania do Porto","Os concessionários","A Polícia Marítima"],c:1,exp:"O posto de praia é instalado nas ZAB nos termos determinados pelo Edital da Capitania do Porto."},
    {q:"É da responsabilidade do Nadador-Salvador (NS):",pts:3,opts:["Içar/arriar as bandeiras de sinais","Içar/arriar a bandeira azul","Içar/arriar a bandeira de ouro","Todas as respostas anteriores estão corretas"],c:0,exp:"É da responsabilidade do NS içar/arriar as bandeiras de sinais conforme a avaliação das condições."},
    {q:"A maré de sizígia ou maré viva ocorre quando:",pts:4,opts:["Sol e a Lua estão alinhados com a Terra","O Sol e a Lua formam um ângulo de 90º com a Terra","A Terra completa uma volta ao Sol","A Terra completa uma volta no seu próprio eixo"],c:0,exp:"A maré de sizígia (maré viva) ocorre quando o Sol e a Lua estão alinhados com a Terra — fases de Lua Cheia e Lua Nova."}
  ]},
  c6:{id:'c6',label:'Capítulo 6',title:'O Salvamento',desc:'Fases, náufragos, técnicas, meios e sinalética.',questions:[
    {q:"Como deve proceder o NS na abordagem ao náufrago consciente?",pts:4,opts:["Dar indicações curtas, claras e precisas","Ceder o meio de salvamento","Evitar situações de submersão","Todas as respostas estão corretas"],c:3,exp:"Perante náufrago consciente: dar indicações curtas e precisas, ceder o meio de salvamento criando barreira de interposição, e evitar submersão."},
    {q:"Em que fase do salvamento se encontra 'reconhecer as prioridades da emergência e os procedimentos necessários'?",pts:3,opts:["Ação","Planeamento","Evacuação","Reconhecimento"],c:3,exp:"Reconhecer as prioridades e os procedimentos necessários é parte da fase de Reconhecimento."},
    {q:"Perante um náufrago consciente, o NS deverá?",pts:3,opts:["Acionar a 2ª ajuda","Ceder o meio de salvamento ao náufrago, criando uma barreira de interposição","Dar-lhe 5 insuflações","Verificar se respira espontaneamente"],c:1,exp:"Perante náufrago consciente, ceder o meio de salvamento criando barreira de interposição entre NS e náufrago."},
    {q:"Quais as técnicas de extração de náufragos em piscina?",pts:4,opts:["Técnica de arrasto e a 2 nadadores salvadores","Técnica de declive suave e de declive acentuado","Técnica de bombeiro e por arrasto","Técnica de declive suave e a 2 nadadores salvadores"],c:1,exp:"As técnicas de extração em piscina são: Declive Suave e Declive Acentuado."},
    {q:"Após o NS alcançar o náufrago, verificar que está aparentemente inconsciente e que não respira, como deverá proceder?",pts:4,opts:["Dá-lhe 3 insuflações, inicia o resgate com 5 insuflações de 15 em 15 segundos","Resgate sem insuflações","Dá-lhe 5 insuflações, inicia o resgate com 3 insuflações de 15 em 15 segundos","Dá-lhe 10 insuflações e inicia o resgate para terra"],c:3,exp:"Náufrago inconsciente que não respira: dar 10 insuflações e iniciar o resgate para terra."},
    {q:"Na cadeia de sobrevivência do afogamento, qual dos elos se considera de maior importância?",pts:3,opts:["Prevenção","Reconhecer o afogado e ligar 112","Suporte Básico de Vida","Todos são de igual modo importantes"],c:3,exp:"Todos os elos da cadeia de sobrevivência são de igual importância."},
    {q:"As componentes do resgate aquático na fase de ação são?",pts:4,opts:["Entrada, aproximação, reboque e transporte","Reconhecimento, planeamento e ação","Entrada, 2ª ajuda, aproximação e reboque","Seleção do meio, entrada, reboque e transporte"],c:0,exp:"As componentes do resgate na fase de ação são: entrada, aproximação, reboque e transporte."},
    {q:"Qual dos métodos de salvamento oferece menos perigo para o Nadador-Salvador?",pts:3,opts:["Remar","Rebocar","Lançar","Caminhar"],c:1,exp:"Lançar é o segundo método mais seguro. Alcançar é o menos perigoso de todos (NS mantém-se em terra)."},
    {q:"Dos métodos de salvamento abaixo, indique o de menor e o de maior risco para o NS.",pts:3,opts:["Lançar e rebocar","Caminhar e nadar","Alcançar e rebocar","Nadar e rebocar"],c:2,exp:"Alcançar é o de menor risco (NS em terra) e rebocar é o de maior risco (contacto direto na água)."},
    {q:"Na fase da ação, qual é o método em que se utiliza a vara de salvamento?",pts:3,opts:["Alcançar","Lançar","Caminhar","Nadar até a vítima"],c:0,exp:"Alcançar — o NS usa um objeto (vara, ramo) para alcançar a vítima mantendo-se em terra ou num ponto fixo."},
    {q:"Quais os elos da cadeia de sobrevivência do afogamento?",pts:4,opts:["112, SBV, DAE e SAV","Reconheça o afogado, SAV, fornecer flutuação e prevenção","Prevenção, reconheça o afogado, forneça flutuação, retire da água e SBV","112, reconheça o afogado, SBV e DAE"],c:2,exp:"Os 5 elos são: Prevenção → Reconhecer o afogado → Fornecer flutuação → Retirar da água → SBV."},
    {q:"No sistema de sinalização com apito, qual o código utilizado?",pts:4,opts:["1 sopro curto para chamar à atenção de outros NS. 3 sopros longos para sinalizar o início de salvamento","2 sopros curtos para chamar à atenção de utentes. 1 sopro curto para chamar à atenção de outros NS","1 sopro curto para advertir banhista individualmente. 3 sopros longos para sinalizar o início de salvamento","2 sopros curtos para sinalizar salvamento. 3 sopros longos para chamar à atenção de outros NS"],c:2,exp:"1 sopro curto = advertir banhista individualmente. 2 sopros curtos = chamar outros NS. 3 sopros longos = salvamento em curso."},
    {q:"O NS que está em terra vê o outro NS com os dois braços cruzados acima da cabeça, fora de água. O que lhe está a transmitir?",pts:3,opts:["O NS necessita de apoio","Pedido de 2° ajuda","Náufrago encontra-se mais para trás","Náufrago submerso"],c:3,exp:"Dois braços cruzados acima da cabeça = náufrago submerso — não foi encontrado."},
    {q:"Quais os cuidados a ter durante os reboques?",pts:4,opts:["Que a vítima tenha sempre as vias respiratórias fora de água","Que seja seguro para o nadador-salvador e para o náufrago","Que seja eficiente para o NS, de forma a que ao chegar a terra não esteja exausto","Todas as respostas estão corretas"],c:3,exp:"Todos os cuidados são importantes: vias aéreas fora de água, segurança para ambos, e eficiência do NS."},
    {q:"Perante uma vítima com suspeita de trauma cervical, que reboque utilizaria?",pts:4,opts:["Reboque convencional","Reboque pelos maxilares","Reboque com boia circular","Reboque braços em V"],c:3,exp:"O reboque com braços em V confere algum apoio à zona cervical — é o indicado em suspeita de trauma vertebro-medular."},
    {q:"Em que fase do salvamento o NS deve escolher o meio de salvamento?",pts:3,opts:["No reconhecimento","Na ação","No planeamento","Na entrada na água"],c:2,exp:"A escolha do meio de salvamento é feita na fase de Planeamento."},
    {q:"Perante uma situação de múltiplos náufragos, qual a triagem a considerar?",pts:3,opts:["Primeiro os náufragos inconscientes","Primeiro os náufragos conscientes que sabem nadar","Primeiro os náufragos conscientes, entre estes, os não nadadores","Efetuar o salvamento sem qualquer ordem"],c:2,exp:"Triagem: 1º náufragos conscientes não nadadores → 2º náufragos conscientes nadadores → 3º náufragos inconscientes."},
    {q:"Em que fase do salvamento o NS confirma o número de vítimas?",pts:3,opts:["Na evasão","No reconhecimento","No planeamento","Na ação"],c:1,exp:"A confirmação do número de vítimas é feita na fase de Reconhecimento."},
    {q:"Qual destes métodos de salvamento oferece mais perigo para o NS?",pts:3,opts:["Remar","Lançar","Nadar","Caminhar"],c:2,exp:"Nadar até à vítima é o 5º método na escada de perigosidade. Rebocar é o mais perigoso (6º)."},
    {q:"Quantos elos tem a cadeia de sobrevivência no afogamento?",pts:3,opts:["6","4","5","3"],c:2,exp:"A cadeia de sobrevivência no afogamento tem 5 elos: Prevenção → Reconhecer → Fornecer flutuação → Retirar da água → SBV."},
    {q:"Ao chegar à distância de segurança e verificar que o náufrago está aparentemente inconsciente, qual deverá ser o procedimento?",pts:4,opts:["Pedir ajuda, retirar as vias respiratórias fora de água e rebocá-lo","Acionar a 2ª ajuda","Pede-lhe colaboração no resgate","Agarrar o náufrago, trazendo-o à superfície se estiver submerso"],c:0,exp:"Náufrago aparentemente inconsciente: pedir ajuda (2ª ajuda), retirar vias aéreas fora de água e rebocar."},
    {q:"Em que fase do salvamento o NS tem que 'pensar antes de agir'?",pts:3,opts:["Reconhecimento","Ação e planeamento","Ação","Planeamento"],c:3,exp:"'Pensar antes de agir' é um princípio da fase de Planeamento."},
    {q:"Nos princípios do salvamento aquático, em que fase se encontra 'constatar a emergência e assumir a responsabilidade'?",pts:3,opts:["Planeamento","Evasão","Reconhecimento","Ação"],c:2,exp:"Constatar a emergência e assumir a responsabilidade faz parte da fase de Reconhecimento."},
    {q:"Na cadeia de sobrevivência no afogamento, 'caso necessário ligar 112', refere-se a que elo?",pts:4,opts:["Prevenção","Reconheça o afogado","Forneça flutuação","Retire da água"],c:1,exp:"'Ligar 112' está associado ao elo 'Reconheça o afogado'."},
    {q:"No algoritmo de salvamento aquático, indique por ordem as operações na fase de reconhecimento:",pts:4,opts:["Alerta SOS, aproximar, resgatar, relatar","Localizar, transportar, avaliar, resgatar","Verificar nº de náufragos, localizar, planear, abordar, transportar","Alerta SOS, verificar o nº de náufragos, localizar, avaliar condições de mar"],c:3,exp:"Reconhecimento: Alerta SOS → verificar nº de náufragos → localizar → avaliar condições de mar e ambiente."},
    {q:"Após alcançar o náufrago inconsciente como deverá proceder?",pts:4,opts:["Iniciar reboque para terra e dar 2 insuflações de 15 em 15 segundos","Resgatar para terra sem insuflações","Retirar as vias respiratórias fora de água e dar 5 insuflações","Segurar o náufrago em reboque convencional, vias aéreas fora de água, verificar respiração, se não ventila dar 10 insuflações"],c:3,exp:"Reboque convencional, vias aéreas fora de água, verificar respiração. Se não ventila → 10 insuflações e resgatar."},
    {q:"Na fase de reconhecimento, qual a primeira ação que o NS deve tomar?",pts:3,opts:["Escolher o método de salvamento adequado","Alerta SOS - 1ª ajuda","Avaliar as condições do mar e ambientais","Entrar na água com o meio de salvamento escolhido"],c:1,exp:"A primeira ação no Reconhecimento é o Alerta SOS — 1ª Ajuda (outros NS, autoridades, meios complementares)."},
    {q:"A máscara de reanimação (pocket mask) deve ser utilizada como mecanismo de barreira?",pts:4,opts:["Para diminuir a transmissão de bactérias","Para aumentar as probabilidades de sucesso","Para evitar a troca de oxigénio com o dióxido de carbono","Para a vítima reanimar mais rapidamente"],c:0,exp:"A máscara de reanimação é um dispositivo de barreira para diminuir a transmissão de bactérias e doenças."},
    {q:"O NS está na água virado para terra a efetuar movimentos com o braço lateralizado para cima e para baixo, batendo com a mão na água. Significa que?",pts:3,opts:["Está-se a afogar","Necessita de apoio","O náufrago está submerso","Está a efetuar o 2° pedido de ajuda"],c:1,exp:"Braço lateralizado a bater na água (NS na água) = necessita de apoio de outro NS."}
  ]}
};

const LOCKED_CHAPTERS = [
  {label:'Capítulo 1/2',title:'ISN e NS',desc:'Aguarda as perguntas do professor.'},
  {label:'Capítulo 7',title:'Socorro ao Náufrago',desc:'Aguarda as perguntas do professor.'},
  {label:'Capítulo 8',title:'Acidentes Frequentes',desc:'Aguarda as perguntas do professor.'}
];

// ── STATE ──
let sb, currentUser = null;
let quiz = null;

// ── LOCAL STORAGE ──
function getLS(){ return JSON.parse(localStorage.getItem(LS_KEY)||'{"sessions":[],"qstats":{}}'); }
function saveLS(d){ localStorage.setItem(LS_KEY, JSON.stringify(d)); }

function recordSession(chId, mode, score, total, earnedPts, totalPts, durMs){
  const d = getLS();
  d.sessions.push({ch:chId,mode,score,total,earnedPts,totalPts,pct:Math.round(score/total*100),ts:Date.now(),dur:Math.round(durMs/1000)});
  saveLS(d);
}
function recordQStat(qid, correct){
  const d = getLS();
  if(!d.qstats[qid]) d.qstats[qid]={c:0,w:0};
  correct ? d.qstats[qid].c++ : d.qstats[qid].w++;
  saveLS(d);
}
function getReadiness(chId){
  const sessions = getLS().sessions.filter(s=>s.ch===chId && s.mode==='chapter');
  if(!sessions.length) return null;
  const recent = sessions.slice(-5);
  return Math.round(recent.reduce((a,s)=>a+s.pct,0)/recent.length);
}
function getOverall(){
  const scores = Object.keys(CHAPTERS).map(id=>getReadiness(id)).filter(r=>r!==null);
  if(!scores.length) return null;
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
}
function getWrongQs(){
  const d = getLS();
  const wrong = [];
  for(const [qid,stats] of Object.entries(d.qstats)){
    if(stats.w>0){
      const [chId,idxStr] = qid.split('_');
      const ch = CHAPTERS[chId];
      if(ch){ const q=ch.questions[+idxStr]; if(q) wrong.push({...q,_id:qid,_ch:chId}); }
    }
  }
  return wrong;
}

// ── READINESS HELPERS ──
function rClass(p){ if(p===null) return 'rn'; if(p<40) return 'r-red'; if(p<65) return 'r-yellow'; if(p<85) return 'r-green'; return 'r-gold'; }
function rLabel(p){ if(p===null) return '—'; if(p<40) return '🔴 Iniciante'; if(p<65) return '🟡 Em Progresso'; if(p<85) return '🟢 Preparado'; return '🏆 Excelente'; }
function rColor(p){ if(p===null) return '#333'; if(p<40) return '#e74c3c'; if(p<65) return '#f39c12'; if(p<85) return '#58d68d'; return '#f1c40f'; }

// ── AUTH ──
function initSupabase(){
  sb = window.supabase.createClient(SB_URL, SB_KEY);
  sb.auth.onAuthStateChange((event, session)=>{
    currentUser = session?.user || null;
    updateAuthUI();
  });
}

function updateAuthUI(){
  const area = document.getElementById('auth-area');
  if(currentUser){
    const name = currentUser.user_metadata?.full_name || currentUser.email || 'Utilizador';
    const initial = name[0].toUpperCase();
    area.innerHTML = `<div class="tb-user"><div class="tb-avatar">${initial}</div><div class="tb-name">${name.split(' ')[0]}</div><button class="tb-logout" onclick="doLogout()">Sair</button></div>`;
  } else {
    area.innerHTML = `<button class="tb-login-btn" onclick="doLogin()"><svg width="14" height="14" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>Entrar com Google</button>`;
  }
}

async function doLogin(){
  if(!sb) return;
  const { data, error } = await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo:'https://bernardocmcruz-ctrl.github.io/NS-Formacao/auth.html', skipBrowserRedirect:true }
  });
  if(data?.url) (window.top||window).location.href = data.url;
}
async function doLogout(){
  await sb.auth.signOut();
}

// ── SUPABASE SAVE (background, silent) ──
async function sbSaveSession(chId, mode, score, total, dur){
  if(!currentUser||!sb) return;
  try{ await sb.from('quiz_sessions').insert({user_id:currentUser.id,chapter_id:chId,mode,score,total,duration_seconds:dur}); }catch(e){}
}
async function sbSaveQStat(qid, correct){
  if(!currentUser||!sb) return;
  try{
    const {data} = await sb.from('question_stats').select('id,correct_count,wrong_count').eq('user_id',currentUser.id).eq('question_id',qid).maybeSingle();
    if(data){
      await sb.from('question_stats').update({correct_count:data.correct_count+(correct?1:0),wrong_count:data.wrong_count+(correct?0:1),last_seen:new Date().toISOString()}).eq('id',data.id);
    } else {
      await sb.from('question_stats').insert({user_id:currentUser.id,question_id:qid,correct_count:correct?1:0,wrong_count:correct?0:1});
    }
  }catch(e){}
}

// ── DASHBOARD ──
function renderDash(){
  const overall = getOverall();
  const numEl = document.getElementById('hero-num');
  if(overall!==null){
    numEl.textContent = overall+'%';
    numEl.style.color = rColor(overall);
    document.getElementById('hero-level').textContent = rLabel(overall);
    document.getElementById('hero-bar').style.cssText = `width:${overall}%;background:${rColor(overall)};`;
    document.getElementById('hero-desc').textContent = overall>=80 ? 'Estás bem preparado! Mantém o ritmo.' : overall>=60 ? 'Bom progresso! Foca-te nos capítulos mais fracos.' : 'Continua a treinar — completa mais quizzes para melhorar.';
  } else {
    numEl.textContent='—'; numEl.style.color='#444';
    document.getElementById('hero-level').textContent='Ainda sem dados';
    document.getElementById('hero-bar').style.cssText='width:0%;background:#333;';
    document.getElementById('hero-desc').textContent='Completa um quiz para ver a tua preparação.';
  }

  const grid = document.getElementById('ch-grid');
  grid.innerHTML='';
  for(const ch of Object.values(CHAPTERS)){
    const r = getReadiness(ch.id);
    const rc = rClass(r); const color = rColor(r);
    const d = getLS();
    const sessions = d.sessions.filter(s=>s.ch===ch.id && s.mode==='chapter');
    const last = sessions.length ? sessions[sessions.length-1] : null;
    const card = document.createElement('div');
    card.className='ch-card';
    card.onclick=()=>startChapter(ch.id);
    card.innerHTML=`
      <div class="ch-cap">${ch.label}</div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-desc">${ch.desc}</div>
      <div class="ch-meta">
        <span class="ch-r ${rc}">${r!==null ? rLabel(r)+' · '+r+'%' : '— Sem tentativas'}</span>
        <span class="ch-count">${ch.questions.length} perguntas</span>
      </div>
      <div class="ch-prog"><div class="ch-prog-fill" style="width:${r||0}%;background:${color};"></div></div>
      ${last ? `<div class="ch-last">Última: ${last.score}/${last.total} (${last.pct}%)</div>` : ''}
    `;
    grid.appendChild(card);
  }
  for(const ch of LOCKED_CHAPTERS){
    const card = document.createElement('div');
    card.className='ch-card locked';
    card.innerHTML=`<div class="ch-lock">🔒</div><div class="ch-cap">${ch.label}</div><div class="ch-title">${ch.title}</div><div class="ch-desc">${ch.desc}</div><span class="badge-soon">EM BREVE</span>`;
    grid.appendChild(card);
  }

  const wrong = getWrongQs();
  const btn = document.getElementById('btn-review');
  const desc = document.getElementById('review-desc');
  btn.disabled = wrong.length===0;
  desc.textContent = wrong.length>0 ? `${wrong.length} perguntas com erros` : 'Sem erros registados';
}

// ── QUIZ ──
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function startChapter(chId){
  const ch = CHAPTERS[chId];
  const qs = shuffle(ch.questions.map((q,i)=>({...q,_id:chId+'_'+i})));
  beginQuiz({chapterId:chId, mode:'chapter', questions:qs});
}
function startExam(){
  const all=[];
  for(const ch of Object.values(CHAPTERS)) ch.questions.forEach((q,i)=>all.push({...q,_id:ch.id+'_'+i,_ch:ch.id}));
  beginQuiz({chapterId:'exam', mode:'exam', questions:shuffle(all).slice(0,30)});
}
function startReview(){
  const wrong = shuffle(getWrongQs());
  if(!wrong.length) return;
  beginQuiz({chapterId:'review', mode:'review', questions:wrong});
}

function beginQuiz({chapterId, mode, questions}){
  quiz = {chapterId, mode, questions, current:0, score:0, earnedPts:0,
    totalPts:questions.reduce((a,q)=>a+(q.pts||1),0),
    wrong:[], startTime:Date.now(), timerInterval:null, timerLeft:mode==='exam'?30*60:null};

  const modeText = {chapter:'Capítulo', exam:'Exame Simulado', review:'Revisão de Erros'}[mode];
  const chText = mode==='chapter' ? CHAPTERS[chapterId]?.title : mode==='exam' ? 'Todos os capítulos' : 'Perguntas com erros';
  document.getElementById('quiz-ch-lbl').textContent = chText;
  document.getElementById('mode-badge').textContent = modeText;

  const timerEl = document.getElementById('quiz-timer');
  if(mode==='exam'){ timerEl.classList.remove('hidden'); startTimer(); }
  else timerEl.classList.add('hidden');

  showScreen('quiz');
  renderQ();
}

function startTimer(){
  updateTimer();
  quiz.timerInterval = setInterval(()=>{ quiz.timerLeft--; updateTimer(); if(quiz.timerLeft<=0){ clearInterval(quiz.timerInterval); finishQuiz(); } },1000);
}
function updateTimer(){
  const el=document.getElementById('quiz-timer');
  const m=Math.floor(quiz.timerLeft/60), s=quiz.timerLeft%60;
  el.textContent=m+':'+String(s).padStart(2,'0');
  quiz.timerLeft<=300 ? el.classList.add('warn') : el.classList.remove('warn');
}

function renderQ(){
  const q=quiz.questions[quiz.current], total=quiz.questions.length;
  document.getElementById('q-fill').style.width=(quiz.current/total*100)+'%';
  document.getElementById('q-ctr').textContent=(quiz.current+1)+' / '+total;
  document.getElementById('q-num').textContent='Pergunta '+(quiz.current+1)+' de '+total;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-fb').style.display='none';
  document.getElementById('q-next').style.display='none';

  const letters=['A','B','C','D'];
  const optsEl=document.getElementById('opts');
  optsEl.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-ltr">${letters[i]}</span><span>${o}</span>`;
    btn.onclick=()=>answer(i);
    optsEl.appendChild(btn);
  });
}

function answer(i){
  const q=quiz.questions[quiz.current];
  const opts=document.getElementById('opts').querySelectorAll('.opt');
  opts.forEach(o=>o.disabled=true);
  const correct=i===q.c;

  recordQStat(q._id, correct);
  sbSaveQStat(q._id, correct);

  if(correct){ opts[i].classList.add('correct'); quiz.score++; quiz.earnedPts+=(q.pts||1); }
  else { opts[i].classList.add('wrong'); opts[q.c].classList.add('show-correct'); quiz.wrong.push(q); }

  if(quiz.mode!=='exam'){
    const fb=document.getElementById('q-fb');
    fb.className='q-fb '+(correct?'ok':'err');
    fb.textContent=(correct?'✓ Correto! ':'✗ Errado. ')+(q.exp||'');
    fb.style.display='block';
  }
  const nxt=document.getElementById('q-next');
  nxt.style.display='inline-block';
  nxt.textContent=quiz.current+1<quiz.questions.length?'Próxima pergunta →':'Ver resultado →';
}

function nextQ(){
  quiz.current++;
  if(quiz.current>=quiz.questions.length) finishQuiz(); else renderQ();
}

function finishQuiz(){
  if(quiz.timerInterval) clearInterval(quiz.timerInterval);
  const dur=Date.now()-quiz.startTime;
  const pct=Math.round(quiz.score/quiz.questions.length*100);
  recordSession(quiz.chapterId, quiz.mode, quiz.score, quiz.questions.length, quiz.earnedPts, quiz.totalPts, dur);
  sbSaveSession(quiz.chapterId, quiz.mode, quiz.score, quiz.questions.length, Math.round(dur/1000));
  showResults(pct, dur);
}

// ── RESULTS ──
function showResults(pct, dur){
  const circ=326.7, offset=circ-(pct/100*circ);
  const ring=document.getElementById('ring-fg');
  ring.style.strokeDashoffset=circ;
  ring.className='ring-fg '+(pct>=85?'gold':pct>=65?'g':pct>=40?'y':'');
  setTimeout(()=>ring.style.strokeDashoffset=offset,50);

  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-level').textContent=rLabel(pct);
  document.getElementById('r-msg').textContent=pct>=80?'🎉 Excelente! Estás muito bem preparado.':pct>=60?'👍 Bom resultado! Revê as perguntas que erraste.':'📚 Continua a estudar — foca-te nos temas com mais erros.';
  document.getElementById('r-correct').textContent=quiz.score;
  document.getElementById('r-wrong-n').textContent=quiz.questions.length-quiz.score;
  document.getElementById('r-pts').textContent=quiz.earnedPts+'/'+quiz.totalPts;
  const m=Math.floor(dur/60000), s=Math.floor((dur%60000)/1000);
  document.getElementById('r-time').textContent=m+':'+String(s).padStart(2,'0');

  const ws=document.getElementById('wrong-sec');
  if(quiz.wrong.length>0){
    ws.classList.remove('hidden');
    document.getElementById('wrong-list').innerHTML=quiz.wrong.map(q=>`<div class="wrong-item">${q.q}<div class="wrong-ans">✓ ${q.opts[q.c]}</div></div>`).join('');
  } else ws.classList.add('hidden');

  showScreen('results');
}

function retryQuiz(){
  if(quiz.mode==='chapter') startChapter(quiz.chapterId);
  else if(quiz.mode==='exam') startExam();
  else startReview();
}

// ── NAV ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}
function goHome(){
  if(quiz?.timerInterval) clearInterval(quiz.timerInterval);
  quiz=null;
  renderDash();
  showScreen('dash');
}

// ── INIT ──
window.addEventListener('DOMContentLoaded',()=>{
  initSupabase();
  renderDash();
});
</script>

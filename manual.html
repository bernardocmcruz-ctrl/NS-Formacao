<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual NS — Nadador-Salvador</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(155deg,#0a2744 0%,#0a3d62 45%,#0e4f7a 75%,#155a8a 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.soon{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:16px;}
.soon-icon{font-size:64px;opacity:0.35;}
.pill{display:inline-block;padding:6px 16px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(192,57,43,0.2);color:#f1948a;border:1px solid rgba(192,57,43,0.3);}
.soon h2{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;color:rgba(255,255,255,0.85);}
.soon p{font-size:14px;color:rgba(255,255,255,0.4);max-width:400px;line-height:1.75;}
.chapters{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:8px;max-width:640px;width:100%;}
.ch{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 16px;text-align:left;}
.ch-num{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4px;}
.ch-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.7);}
</style>
</head>
<body>
<div class="soon">
  <div class="soon-icon">📖</div>
  <div class="pill">Em construção</div>
  <h2>Manual Técnico NS</h2>
  <p>O manual dinâmico com sidebar navegável, pesquisa e conteúdo completo está a ser desenvolvido. Capítulos previstos:</p>
  <div class="chapters">
    <div class="ch"><div class="ch-num">Cap. 1 / 2</div><div class="ch-name">ISN e Nadador-Salvador</div></div>
    <div class="ch"><div class="ch-num">Cap. 3</div><div class="ch-name">O Afogamento</div></div>
    <div class="ch"><div class="ch-num">Cap. 4</div><div class="ch-name">Praias</div></div>
    <div class="ch"><div class="ch-num">Cap. 6</div><div class="ch-name">O Salvamento</div></div>
    <div class="ch"><div class="ch-num">Cap. 7</div><div class="ch-name">Socorro ao Náufrago</div></div>
    <div class="ch"><div class="ch-num">Cap. 8</div><div class="ch-name">Acidentes Frequentes</div></div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual NS — Nadador-Salvador</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#061426;color:#fff;}

/* TOOLBAR */
.toolbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:rgba(6,20,38,0.99);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;gap:6px;
  padding:0 14px;z-index:100;
}
.tb-brand{
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;
  color:rgba(255,255,255,0.8);margin-right:8px;white-space:nowrap;
  display:flex;align-items:center;gap:7px;flex-shrink:0;
}
.tb-brand span{
  background:#c0392b;padding:2px 7px;border-radius:4px;
  font-size:11px;color:#fff;letter-spacing:0.5px;
}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,0.1);flex-shrink:0;margin:0 2px;}
.tb-btn{
  display:flex;align-items:center;justify-content:center;
  min-width:30px;height:30px;border-radius:6px;padding:0 8px;
  border:none;background:rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.65);cursor:pointer;font-size:13px;
  transition:all .15s;flex-shrink:0;
}
.tb-btn:hover:not(:disabled){background:rgba(255,255,255,0.13);color:#fff;}
.tb-btn:disabled{opacity:0.25;cursor:default;}
.tb-page{
  display:flex;align-items:center;gap:5px;
  font-size:13px;color:rgba(255,255,255,0.45);flex-shrink:0;
}
.tb-page input{
  width:44px;text-align:center;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:5px;padding:3px 4px;color:#fff;font-size:13px;outline:none;
}
.tb-page input:focus{border-color:rgba(192,57,43,0.5);}
.tb-zoom-label{font-size:11px;color:rgba(255,255,255,0.35);width:38px;text-align:center;flex-shrink:0;}

/* SEARCH */
.tb-search{
  flex:1;max-width:280px;margin-left:auto;position:relative;
}
.tb-search input{
  width:100%;padding:6px 12px 6px 30px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;color:#fff;font-size:12px;outline:none;
}
.tb-search input::placeholder{color:rgba(255,255,255,0.28);}
.tb-search input:focus{border-color:rgba(192,57,43,0.4);background:rgba(255,255,255,0.09);}
.tb-search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;opacity:0.35;pointer-events:none;}
.search-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:rgba(6,20,38,0.98);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;overflow:hidden;
  max-height:320px;overflow-y:auto;
  display:none;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.search-dropdown.open{display:block;}
.search-dropdown::-webkit-scrollbar{width:3px;}
.search-dropdown::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);}
.sr-item{
  padding:9px 14px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition:background .12s;
}
.sr-item:hover{background:rgba(255,255,255,0.07);}
.sr-item:last-child{border-bottom:none;}
.sr-page{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#f1948a;margin-bottom:3px;}
.sr-text{font-size:11.5px;color:rgba(255,255,255,0.45);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.sr-empty{padding:16px 14px;font-size:12px;color:rgba(255,255,255,0.3);text-align:center;}

/* SIDE ARROWS */
.nav-arrow{
  position:fixed;top:52px;bottom:0;width:64px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;
  z-index:10;transition:background .2s;
}
.nav-arrow:hover:not(:disabled){background:rgba(255,255,255,0.04);}
.nav-arrow:disabled{cursor:default;pointer-events:none;}
.nav-arrow.left{left:0;}
.nav-arrow.right{right:0;}
.arrow-icon{
  font-size:48px;font-weight:200;line-height:1;
  color:rgba(255,255,255,0.18);
  transition:color .2s, transform .15s;
  user-select:none;
}
.nav-arrow:hover:not(:disabled) .arrow-icon{
  color:rgba(255,255,255,0.7);
  transform:scale(1.08);
}
.nav-arrow:disabled .arrow-icon{color:rgba(255,255,255,0.06);}

/* MAIN */
.main{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  overflow:auto;background:#0d1e32;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 80px 48px;
}
.main::-webkit-scrollbar{width:5px;height:5px;}
.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}

.canvas-wrap{
  position:relative;flex-shrink:0;
  background:#fff;
  box-shadow:0 12px 48px rgba(0,0,0,0.6),0 2px 8px rgba(0,0,0,0.4);
  border-radius:3px;
}
#pdf-canvas{display:block;}

.loading-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,25,44,0.88);border-radius:3px;gap:12px;
}
.spinner{
  width:28px;height:28px;border:2.5px solid rgba(255,255,255,0.1);
  border-top-color:#c0392b;border-radius:50%;
  animation:spin .65s linear infinite;
}
.loading-text{font-size:12px;color:rgba(255,255,255,0.4);}
@keyframes spin{to{transform:rotate(360deg);}}

.error-wrap{
  padding:64px 40px;text-align:center;color:rgba(255,255,255,0.4);
}
.error-wrap h3{
  font-family:'Bebas Neue',sans-serif;font-size:26px;
  color:rgba(255,255,255,0.6);margin-bottom:10px;
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="tb-brand">
    <span>NS</span>
    Manual Técnico
  </div>

  <div class="tb-sep"></div>

  <div class="tb-page">
    Pág.
    <input type="number" id="page-input" min="1" value="1"
           onchange="goToPage(this.value)"
           onkeydown="if(event.key==='Enter')goToPage(this.value)">
    <span>/ <span id="page-total">—</span></span>
  </div>

  <div class="tb-sep"></div>

  <button class="tb-btn" onclick="zoomOut()" title="Diminuir (−)">−</button>
  <div class="tb-zoom-label" id="zoom-label">—</div>
  <button class="tb-btn" onclick="zoomIn()" title="Aumentar (+)">+</button>

  <div class="tb-search">
    <span class="tb-search-ico">🔍</span>
    <input type="text" id="search-input" placeholder="Pesquisar no manual..."
           oninput="onSearchInput(this.value)"
           onblur="setTimeout(()=>closeDropdown(),300)">
    <div class="search-dropdown" id="search-dropdown"></div>
  </div>
</div>

<!-- SIDE ARROWS -->
<button class="nav-arrow left"  id="btn-prev" onclick="prevPage()" disabled>
  <span class="arrow-icon">&#8249;</span>
</button>
<button class="nav-arrow right" id="btn-next" onclick="nextPage()" disabled>
  <span class="arrow-icon">&#8250;</span>
</button>

<!-- MAIN -->
<div class="main" id="main">
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="pdf-canvas"></canvas>
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">A carregar...</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc      = null;
let curPage     = 1;
let scale       = 1.5;
let renderTask  = null;
let pageTexts   = {};
let searchTimer = null;

/* ── INIT ── */
async function init() {
  try {
    const task = pdfjsLib.getDocument('Manual-NS.pdf');

    task.onProgress = ({ loaded, total }) => {
      if (total) {
        const pct = Math.round(loaded / total * 100);
        document.getElementById('loading-text').textContent = `A carregar... ${pct}%`;
      }
    };

    pdfDoc = await task.promise;

    document.getElementById('page-total').textContent  = pdfDoc.numPages;
    document.getElementById('page-input').max          = pdfDoc.numPages;

    // Wait one frame so the iframe container is fully sized
    await new Promise(r => requestAnimationFrame(r));

    // Calculate fit-width scale before first render
    const firstPage = await pdfDoc.getPage(1);
    const vp0       = firstPage.getViewport({ scale: 1 });
    const avail     = document.getElementById('main').clientWidth - 160;
    scale = Math.max(0.5, Math.min(avail / vp0.width, 3));
    document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';

    await renderPage(1);
    indexAll(); // background text indexing

  } catch (err) {
    console.error(err);
    document.getElementById('canvas-wrap').innerHTML = `
      <div class="error-wrap">
        <h3>Erro ao carregar o PDF</h3>
        <p>Certifica-te que <strong>Manual-NS.pdf</strong> está na mesma pasta.<br>
        Abre via Live Server ou GitHub Pages — o <code>file://</code> bloqueia ficheiros locais.</p>
      </div>`;
  }
}

/* ── RENDER ── */
async function renderPage(n) {
  if (!pdfDoc || n < 1 || n > pdfDoc.numPages) return;

  curPage = n;
  document.getElementById('page-input').value  = n;
  document.getElementById('btn-prev').disabled = n <= 1;
  document.getElementById('btn-next').disabled = n >= pdfDoc.numPages;

  setLoading(true, 'A renderizar...');

  if (renderTask) { try { renderTask.cancel(); } catch(e){} renderTask = null; }

  try {
    const page = await pdfDoc.getPage(n);
    const dpr  = window.devicePixelRatio || 1;
    const vp   = page.getViewport({ scale: scale * dpr });

    const canvas = document.getElementById('pdf-canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    // CSS size = logical pixels (sharp on retina)
    canvas.style.width  = Math.round(vp.width  / dpr) + 'px';
    canvas.style.height = Math.round(vp.height / dpr) + 'px';

    renderTask = page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
    await renderTask.promise;
    renderTask = null;

    document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {
    if (e.name !== 'RenderingCancelledException') console.error(e);
  }

  setLoading(false);
}

function setLoading(show, msg) {
  const el = document.getElementById('loading-overlay');
  el.style.display = show ? 'flex' : 'none';
  if (msg) document.getElementById('loading-text').textContent = msg;
}

/* ── NAV ── */
function prevPage() { renderPage(curPage - 1); }
function nextPage() { renderPage(curPage + 1); }
function goToPage(v) {
  const n = parseInt(v);
  if (!isNaN(n)) renderPage(Math.max(1, Math.min(n, pdfDoc.numPages)));
}

/* ── ZOOM ── */
function zoomIn()  { scale = Math.min(scale + 0.25, 3.5); applyZoom(); }
function zoomOut() { scale = Math.max(scale - 0.25, 0.4); applyZoom(); }
function applyZoom() {
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
  renderPage(curPage);
}
async function fitWidth() {
  if (!pdfDoc) return;
  const page  = await pdfDoc.getPage(curPage);
  const vp    = page.getViewport({ scale: 1 });
  const avail = document.getElementById('main').clientWidth - 160;
  scale = Math.max(0.4, Math.min(avail / vp.width, 3.5));
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
  renderPage(curPage);
}

/* ── TEXT INDEX ── */
async function indexAll() {
  const input = document.getElementById('search-input');
  let totalChars = 0;

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    try {
      const page = await pdfDoc.getPage(i);
      const tc   = await page.getTextContent();
      const text = tc.items.map(x => x.str).filter(s => s.trim()).join(' ');
      pageTexts[i] = text;
      totalChars  += text.length;
    } catch(e) {}

    // Update placeholder every 10 pages
    if (i % 10 === 0 || i === pdfDoc.numPages) {
      if (input && document.activeElement !== input)
        input.placeholder = `A indexar... ${i}/${pdfDoc.numPages}`;
    }
  }

  if (!input) return;

  if (totalChars < 200) {
    // PDF é digitalizado — sem texto extraível
    input.placeholder = 'PDF digitalizado — pesquisa indisponível';
    input.disabled    = true;
    input.title       = 'Este PDF é uma imagem digitalizada. O PDF.js não consegue extrair texto de scans.';
  } else {
    input.placeholder = `Pesquisar no manual... (${pdfDoc.numPages} págs. indexadas)`;
  }
}

/* ── SEARCH ── */
function onSearchInput(q) {
  clearTimeout(searchTimer);
  const dd = document.getElementById('search-dropdown');
  if (!q.trim()) { dd.classList.remove('open'); return; }
  searchTimer = setTimeout(() => runSearch(q.trim()), 350);
}

function runSearch(q) {
  const dd = document.getElementById('search-dropdown');
  const ql = q.toLowerCase();
  const res = [];

  for (let i = 1; i <= (pdfDoc ? pdfDoc.numPages : 0); i++) {
    const txt = pageTexts[i] || '';
    if (txt.toLowerCase().includes(ql)) {
      const idx     = txt.toLowerCase().indexOf(ql);
      const snippet = txt.substring(Math.max(0, idx - 35), idx + 90).trim();
      res.push({ page: i, snippet });
    }
  }

  if (!res.length) {
    const indexed = Object.keys(pageTexts).length;
    const total   = pdfDoc?.numPages || 0;
    const still   = indexed < total;
    dd.innerHTML  = still
      ? `<div class="sr-empty">A indexar... ${indexed}/${total} págs.<br><span style="font-size:11px;opacity:.6">Aguarda e pesquisa de novo.</span></div>`
      : `<div class="sr-empty">Sem resultados para "<strong>${q}</strong>".</div>`;
  } else {
    dd.innerHTML = res.map(r => `
      <div class="sr-item" onclick="renderPage(${r.page});closeDropdown()">
        <div class="sr-page">Página ${r.page}</div>
        <div class="sr-text">${r.snippet}</div>
      </div>`).join('');
  }
  dd.classList.add('open');
}

function closeDropdown() {
  document.getElementById('search-dropdown').classList.remove('open');
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown'  || e.key === 'PageDown') nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp'    || e.key === 'PageUp')   prevPage();
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === 'f' || e.key === 'F') fitWidth();
});

// Auto-fit on window resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(fitWidth, 200);
});

init();
</script>
</body>
</html>
